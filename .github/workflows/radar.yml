name: Daily radar

on:
  schedule:
    - cron: "17 12 * * *" # daily, ~12:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run radar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/radar.mjs
      - name: Commit digest
        run: |
          git config user.name "mapzimus-radar[bot]"
          git config user.email "actions@github.com"
          git add radar/
          git diff --cached --quiet || git commit -m "Radar digest $(date -u +%F)"
          git push
