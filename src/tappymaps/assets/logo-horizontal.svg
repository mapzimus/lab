<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160">

  <!-- Icon fits within x=0-218, y=0-160 -->
  <g transform="translate(8, 8) scale(1.4)">
    <polygon points="60,0 120,0 150,52 120,104 60,104 30,52" fill="#0D6E8A"/>
    <polygon points="72,14 108,14 126,45 108,76 72,76 54,45" fill="#12A6C8" opacity="0.55"/>
    <circle cx="90" cy="44" r="14" fill="white"/>
    <polygon points="82,55 98,55 90,78" fill="white"/>
    <circle cx="90" cy="44" r="6" fill="#0D6E8A"/>
  </g>

  <!-- Wordmark starts at x=230, safely after icon -->
  <text x="230" y="96"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#0D6E8A"
    letter-spacing="-1">map<tspan fill="#12A6C8">paratus</tspan></text>

  <!-- Rule under wordmark -->
  <line x1="230" y1="112" x2="850" y2="112" stroke="#12A6C8" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="232" y="138"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="#5BA8BB"
    letter-spacing="5">simple maps, simple tools</text>

</svg>
