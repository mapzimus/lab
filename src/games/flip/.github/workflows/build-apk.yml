name: Build offline APK

on:
  workflow_dispatch:        # lets you build it on demand from the Actions tab
  push:
    branches: [master]
    paths:
      - 'index.html'
      - 'css/**'
      - 'js/**'
      - 'icons/**'
      - 'manifest.json'
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write           # needed to publish the APK as a Release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Bundle the game files into the APK assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r index.html css js icons manifest.json android/app/src/main/assets/
          mkdir -p android/app/src/main/res/drawable
          cp icons/icon-512.png android/app/src/main/res/drawable/ic_launcher.png

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk flipgame-offline.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flipgame-offline-apk
          path: flipgame-offline.apk

      - name: Publish to "apk-latest" release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Flip Game — offline APK (latest)
          body: |
            Self-contained offline Android APK. Game files are bundled inside,
            so it needs no network. Sideload onto an Android device/panel:
            enable "Install unknown apps", then open this .apk.
            (Debug-signed — fine for sideloading; not for the Play Store.)
          files: flipgame-offline.apk
