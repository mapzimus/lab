<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Function Grapher</title>
<meta name="description" content="Plot a line or a parabola, drag the sliders, and see the slope, intercepts, vertex, and axis of symmetry update live. Fully client-side.">
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }

  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }

  .label { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 6px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .pills button { cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 7px 16px; font-weight: 600; font-size: .85rem; }
  .pills button:hover { border-color: var(--accent); }
  .pills button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
  canvas { display: block; width: 100%; height: auto; border-radius: 10px; background: var(--surface-2); }
  .eqn { text-align: center; font-size: 1.35rem; font-weight: 800; color: var(--accent); margin: 4px 0 16px; font-variant-numeric: tabular-nums; }

  .ctrl { display: grid; grid-template-columns: auto 1fr auto; gap: 10px 14px; align-items: center; }
  .ctrl label { font-weight: 700; color: var(--accent); font-size: 1.05rem; }
  .ctrl input[type=range] { width: 100%; accent-color: var(--accent); }
  .ctrl input[type=number] { width: 80px; padding: 7px 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; text-align: center; background: var(--surface); color: var(--text); }
  @media (max-width: 480px) {
    .ctrl { grid-template-columns: auto 1fr; }
    .ctrl input[type=number] { grid-column: 1 / -1; justify-self: start; }
  }

  .readouts { display: flex; flex-wrap: wrap; gap: 8px; }
  .ro { background: var(--surface-2); border-radius: 10px; padding: 8px 12px; font-size: .9rem; color: var(--text); }
  .ro b { color: var(--accent); font-variant-numeric: tabular-nums; }

  footer.app { margin-top: 22px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">← All tools</a>
      <h1>Function Grapher</h1>
      <p>Plot a line or a parabola with sliders and see its slope, intercepts, vertex, and axis of symmetry update live.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">🌗 Theme</button>
  </header>

  <div class="label">Function type</div>
  <div class="pills" id="modes" role="group" aria-label="Function type">
    <button data-mode="line" aria-pressed="true" type="button">Line</button>
    <button data-mode="parabola" aria-pressed="false" type="button">Parabola</button>
  </div>

  <div class="card">
    <div class="eqn" id="eqn">—</div>
    <canvas id="plot" width="640" height="480" aria-label="Function graph"></canvas>
  </div>

  <div class="card">
    <div class="ctrl" id="controls"></div>
  </div>

  <div class="card">
    <div class="label">What the graph shows</div>
    <div class="readouts" id="readouts"></div>
  </div>

  <footer class="app">Nothing you enter here leaves your browser · a <strong>max</strong> tool</footer>
</div>

<script>
(function(){
  "use strict";
  var PREFS="max-function-grapher-prefs";
  var prefs={mode:"line", m:1, b:0, a:1, bb:0, c:-3};
  try{ var s=JSON.parse(localStorage.getItem(PREFS)); if(s) prefs=Object.assign(prefs,s); }catch(e){}

  var canvas=document.getElementById("plot"), ctx=canvas.getContext("2d");
  var VMIN=-10, VMAX=10;   // graph window in math units (both axes)

  function fmt(n){ if(!isFinite(n)) return "—"; var r=Math.round(n*100)/100; return (Object.is(r,-0)?0:r).toString(); }
  function signed(n){ n=Math.round(n*100)/100; return (n<0?" − "+Math.abs(n):" + "+n); }
  function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

  /* ---- control definitions per mode ---- */
  var CONTROLS={
    line:[ {k:"m",label:"m",min:-10,max:10,step:0.5}, {k:"b",label:"b",min:-10,max:10,step:0.5} ],
    parabola:[ {k:"a",label:"a",min:-4,max:4,step:0.25}, {k:"bb",label:"b",min:-10,max:10,step:0.5}, {k:"c",label:"c",min:-10,max:10,step:0.5} ]
  };

  function buildControls(){
    var host=document.getElementById("controls"); host.innerHTML="";
    CONTROLS[prefs.mode].forEach(function(cfg){
      var lab=document.createElement("label"); lab.textContent=cfg.label+" ="; lab.setAttribute("for","r_"+cfg.k);
      var range=document.createElement("input"); range.type="range"; range.id="r_"+cfg.k;
      range.min=cfg.min; range.max=cfg.max; range.step=cfg.step; range.value=prefs[cfg.k];
      var num=document.createElement("input"); num.type="number"; num.step=cfg.step; num.value=prefs[cfg.k];
      num.setAttribute("aria-label",cfg.label+" value");
      range.oninput=function(){ prefs[cfg.k]=parseFloat(range.value); num.value=range.value; save(); draw(); };
      num.oninput=function(){ var v=parseFloat(num.value); if(isNaN(v)) return; prefs[cfg.k]=v; range.value=v; save(); draw(); };
      host.appendChild(lab); host.appendChild(range); host.appendChild(num);
    });
  }

  function equationText(){
    if(prefs.mode==="line") return "y = "+fmt(prefs.m)+"x"+signed(prefs.b);
    return "y = "+fmt(prefs.a)+"x²"+signed(prefs.bb)+"x"+signed(prefs.c);
  }
  function fOf(x){
    return prefs.mode==="line" ? prefs.m*x+prefs.b : prefs.a*x*x+prefs.bb*x+prefs.c;
  }

  /* ---- canvas drawing (device-pixel aware, responsive, theme-aware) ---- */
  function resize(){
    var cssW=canvas.clientWidth || 640;
    var cssH=Math.round(cssW*0.75);
    var dpr=window.devicePixelRatio||1;
    canvas.width=cssW*dpr; canvas.height=cssH*dpr;
    canvas.style.height=cssH+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    draw();
  }
  function toPx(x,y,W,H){
    return { x:(x-VMIN)/(VMAX-VMIN)*W, y:H-(y-VMIN)/(VMAX-VMIN)*H };
  }
  function draw(){
    document.getElementById("eqn").textContent=equationText();
    var dpr=window.devicePixelRatio||1, W=canvas.width/dpr, H=canvas.height/dpr;
    var colSurface=cssVar('--surface'), colBorder=cssVar('--border'), colMuted=cssVar('--muted'), colAccent=cssVar('--accent');
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=colSurface; ctx.fillRect(0,0,W,H);

    // gridlines + labels
    ctx.lineWidth=1; ctx.font="11px -apple-system,Segoe UI,Arial,sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    for(var g=VMIN; g<=VMAX; g++){
      var v=toPx(g,g,W,H);
      ctx.strokeStyle = g===0 ? colMuted : colBorder;
      ctx.beginPath(); ctx.moveTo(v.x,0); ctx.lineTo(v.x,H); ctx.stroke();          // vertical
      ctx.beginPath(); ctx.moveTo(0,v.y); ctx.lineTo(W,v.y); ctx.stroke();          // horizontal
    }
    // axes (thicker) + tick labels
    var o=toPx(0,0,W,H);
    ctx.strokeStyle=colMuted; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(o.x,0); ctx.lineTo(o.x,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,o.y); ctx.lineTo(W,o.y); ctx.stroke();
    ctx.fillStyle=colMuted;
    for(var t=VMIN; t<=VMAX; t+=2){ if(t===0) continue;
      var px=toPx(t,0,W,H); ctx.fillText(t, px.x, o.y+10);
      var py=toPx(0,t,W,H); ctx.textAlign="right"; ctx.fillText(t, o.x-6, py.y); ctx.textAlign="center";
    }

    // the curve
    ctx.strokeStyle=colAccent; ctx.lineWidth=2.5; ctx.beginPath();
    var started=false;
    for(var sx=0; sx<=W; sx++){
      var mx=VMIN+(sx/W)*(VMAX-VMIN);
      var my=fOf(mx);
      var p=toPx(mx,my,W,H);
      if(p.y<-5000||p.y>H+5000){ started=false; continue; }
      if(!started){ ctx.moveTo(p.x,p.y); started=true; } else ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
    drawReadouts();
  }

  function drawReadouts(){
    var host=document.getElementById("readouts"); var html="";
    function ro(label,val){ return '<span class="ro">'+label+': <b>'+val+'</b></span>'; }
    if(prefs.mode==="line"){
      html+=ro("Slope", fmt(prefs.m));
      html+=ro("y-intercept", "(0, "+fmt(prefs.b)+")");
      if(prefs.m!==0) html+=ro("x-intercept", "("+fmt(-prefs.b/prefs.m)+", 0)");
      else html+=ro("x-intercept", "none (horizontal)");
    }else{
      var a=prefs.a, b=prefs.bb, c=prefs.c;
      if(a===0){ host.innerHTML='<span class="ro">a = 0 → this is the line y = '+fmt(b)+"x"+signed(c)+'</span>'; return; }
      var vx=-b/(2*a), vy=fOf(vx);
      html+=ro("Vertex", "("+fmt(vx)+", "+fmt(vy)+")");
      html+=ro("Axis of symmetry", "x = "+fmt(vx));
      html+=ro("Opens", a>0?"upward":"downward");
      html+=ro("y-intercept", "(0, "+fmt(c)+")");
      var disc=b*b-4*a*c;
      if(disc>0){ var r1=(-b-Math.sqrt(disc))/(2*a), r2=(-b+Math.sqrt(disc))/(2*a);
        html+=ro("x-intercepts", "("+fmt(r1)+", 0), ("+fmt(r2)+", 0)"); }
      else if(disc===0){ html+=ro("x-intercept", "("+fmt(vx)+", 0) (one)"); }
      else html+=ro("x-intercepts", "none (no real roots)");
    }
    host.innerHTML=html;
  }

  function save(){ try{localStorage.setItem(PREFS,JSON.stringify(prefs));}catch(e){} }

  // mode pills
  Array.prototype.forEach.call(document.querySelectorAll("#modes button"), function(btn){
    btn.setAttribute("aria-pressed", btn.getAttribute("data-mode")===prefs.mode);
    btn.onclick=function(){
      prefs.mode=btn.getAttribute("data-mode"); save();
      Array.prototype.forEach.call(document.querySelectorAll("#modes button"), function(x){ x.setAttribute("aria-pressed", x===btn); });
      buildControls(); draw();
    };
  });

  window.addEventListener("resize", resize);
  buildControls();
  resize();

  // ---- theme toggle ----
  var root = document.documentElement;
  var savedTheme = localStorage.getItem('max-theme');
  if (savedTheme) root.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').addEventListener('click', function () {
    var cur = root.getAttribute('data-theme');
    var isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    var next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('max-theme', next);
    draw();
  });
})();
</script>
</body>
</html>
