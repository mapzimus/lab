<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group Maker</title>
<meta name="description" content="Paste a roster and shuffle it into random groups — by group size or by number of groups. Fully client-side.">
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 48px; }

  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 18px; }
  label { font-weight: 600; font-size: .88rem; display: block; margin-bottom: 6px; }
  textarea { width: 100%; min-height: 130px; padding: 10px; border: 1px solid var(--border); border-radius: 9px; font-size: .95rem; font-family: inherit; background: var(--surface); color: var(--text); resize: vertical; }
  textarea:focus, input:focus, .modes button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .count { color: var(--muted); font-size: .85rem; margin-top: 8px; }

  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; margin-top: 14px; }
  .modes { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
  .modes button { border: 0; background: var(--surface); color: var(--text); padding: 8px 16px; font-weight: 600; cursor: pointer; font-size: .88rem; }
  .modes button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); }
  input[type=number] { width: 76px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; text-align: center; background: var(--surface); color: var(--text); }

  .btn { cursor: pointer; font-weight: 600; font-size: .92rem; padding: 10px 18px; border-radius: 9px; border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink); display: inline-flex; align-items: center; gap: 7px; }
  .btn:hover { filter: brightness(1.05); }
  .btn.secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .btn.secondary:hover { border-color: var(--accent); color: var(--accent); filter: none; }

  .groups { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
  .group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
  .group h3 { margin: 0 0 8px; font-size: 1rem; color: var(--accent); }
  .group ol { margin: 0; padding-left: 22px; }
  .group li { padding: 2px 0; }
  .empty { color: var(--muted); }

  footer.app { margin-top: 22px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }

  @media (max-width: 720px) {
    .row { flex-direction: column; align-items: stretch; }
  }
  @media print {
    header.app, .panel, footer.app { display: none; }
    .group { break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">← max</a>
      <h1>Group Maker</h1>
      <p>Paste a roster, one name per line, and shuffle it into random groups — by group size or by a target number of groups.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">🌗 Theme</button>
  </header>

  <div class="panel">
    <label for="roster">Roster — one name per line</label>
    <textarea id="roster" placeholder="Aisha&#10;Brian&#10;Carlos&#10;Diana&#10;..." aria-describedby="count"></textarea>
    <div class="count" id="count">0 names</div>
    <div class="row">
      <div>
        <label id="modesLabel">Make</label>
        <div class="modes" role="group" aria-labelledby="modesLabel">
          <button id="mSize" type="button" aria-pressed="true">Groups of</button>
          <button id="mCount" type="button" aria-pressed="false"># of groups</button>
        </div>
      </div>
      <div>
        <label for="n" id="nLabel">Size</label>
        <input type="number" id="n" min="1" max="50" value="3">
      </div>
      <button class="btn" id="make" type="button">Make groups</button>
      <button class="btn secondary" id="reshuffle" type="button">Re-shuffle</button>
    </div>
  </div>

  <div class="groups" id="out"><p class="empty">Enter names and click "Make groups."</p></div>

  <footer class="app">Roster and settings are saved in your browser only · a <strong>max</strong> tool</footer>
</div>
<script>
(function () {
  "use strict";
  var R_KEY = "max-groups-roster", M_KEY = "max-groups-mode", N_KEY = "max-groups-n";
  var roster = document.getElementById("roster"), nInput = document.getElementById("n"),
      nLabel = document.getElementById("nLabel"), out = document.getElementById("out"),
      countEl = document.getElementById("count"), mode = "size";

  try { roster.value = localStorage.getItem(R_KEY) || ""; } catch (e) {}
  try { var sm = localStorage.getItem(M_KEY); if (sm) mode = sm; } catch (e) {}
  try { var sn = localStorage.getItem(N_KEY); if (sn) nInput.value = sn; } catch (e) {}

  function names() { return roster.value.split("\n").map(function (s) { return s.trim(); }).filter(Boolean); }
  function updateCount() { countEl.textContent = names().length + " names"; }
  roster.addEventListener("input", function () { try { localStorage.setItem(R_KEY, roster.value); } catch (e) {} updateCount(); });
  nInput.addEventListener("input", function () { try { localStorage.setItem(N_KEY, nInput.value); } catch (e) {} });

  function setMode(m) {
    mode = m; try { localStorage.setItem(M_KEY, m); } catch (e) {}
    document.getElementById("mSize").setAttribute("aria-pressed", m === "size");
    document.getElementById("mCount").setAttribute("aria-pressed", m === "count");
    nLabel.textContent = m === "size" ? "Size" : "Groups";
  }
  document.getElementById("mSize").onclick = function () { setMode("size"); };
  document.getElementById("mCount").onclick = function () { setMode("count"); };
  setMode(mode);

  function shuffle(a) { for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  function make() {
    var list = shuffle(names().slice());
    if (list.length === 0) { out.innerHTML = '<p class="empty">Add some names first.</p>'; return; }
    var n = Math.max(1, parseInt(nInput.value, 10) || 1), groupCount;
    if (mode === "size") groupCount = Math.max(1, Math.ceil(list.length / n));
    else groupCount = Math.max(1, Math.min(n, list.length));
    var groups = []; for (var i = 0; i < groupCount; i++) groups.push([]);
    list.forEach(function (name, i) { groups[i % groupCount].push(name); }); // round-robin keeps sizes within 1
    render(groups);
  }
  function render(groups) {
    out.innerHTML = "";
    groups.forEach(function (g, i) {
      var card = document.createElement("div"); card.className = "group";
      var h = document.createElement("h3"); h.textContent = "Group " + (i + 1) + " (" + g.length + ")"; card.appendChild(h);
      var ol = document.createElement("ol");
      g.forEach(function (name) { var li = document.createElement("li"); li.textContent = name; ol.appendChild(li); });
      card.appendChild(ol); out.appendChild(card);
    });
  }
  document.getElementById("make").onclick = make;
  document.getElementById("reshuffle").onclick = make;
  updateCount();

  // ---------- theme ----------
  var root = document.documentElement;
  var savedTheme = localStorage.getItem('max-theme');
  if (savedTheme) root.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').addEventListener('click', function () {
    var cur = root.getAttribute('data-theme');
    var isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    var next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('max-theme', next);
  });
})();
</script>
</body>
</html>
