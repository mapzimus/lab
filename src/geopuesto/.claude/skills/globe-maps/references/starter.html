<!doctype html>
<!--
  Globe map starter — complete working page, no build step.
  Uses the MapLibre CDN for convenience; on a CSP-locked site, vendor
  maplibre-gl.js/.css next to this file and point the tags at them
  (see SKILL.md gotchas 4-5 for the CSP directives you'll need).
  Adapt: replace DATA with your GeoJSON (or fetch() it), adjust COLORS
  and the popup fields to your properties.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Globe starter</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
    aside { padding: 14px; overflow-y: auto; border-right: 1px solid #ccc; }
    aside button { display: block; width: 100%; text-align: left; margin-bottom: 6px; padding: 8px; cursor: pointer; }
    #map { height: 100%; background: #101318; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
  </style>
</head>
<body>
  <aside><h3>Features</h3><div id="list"></div></aside>
  <div id="map"></div>
  <script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>
  <script>
    const COLORS = { a: "#ff6b4a", b: "#2f9e44", c: "#7455d9" };

    const DATA = { type: "FeatureCollection", features: [
      { type: "Feature", properties: { slug: "london-tokyo", name: "London – Tokyo", category: "a" },
        geometry: { type: "LineString", coordinates: [[-0.1, 51.5], [37.6, 55.8], [82.9, 55.0], [116.4, 39.9], [139.8, 35.7]] } },
      { type: "Feature", properties: { slug: "nyc-buenosaires", name: "New York – Buenos Aires", category: "b" },
        geometry: { type: "LineString", coordinates: [[-74.0, 40.7], [-79.5, 8.9], [-77.0, -12.0], [-58.4, -34.6]] } },
      { type: "Feature", properties: { slug: "cairo-capetown", name: "Cairo – Cape Town", category: "c" },
        geometry: { type: "LineString", coordinates: [[31.2, 30.0], [32.6, 15.6], [36.8, -1.3], [28.0, -26.2], [18.4, -33.9]] } },
    ]};

    // Gotcha 1: densify so lines hug the sphere instead of cutting chords.
    function densify(coords, stepDeg = 1) {
      const out = [coords[0]];
      for (let i = 1; i < coords.length; i++) {
        const [x0, y0] = coords[i - 1], [x1, y1] = coords[i];
        const n = Math.max(1, Math.ceil(Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0)) / stepDeg));
        for (let k = 1; k <= n; k++) out.push([x0 + (x1 - x0) * k / n, y0 + (y1 - y0) * k / n]);
      }
      return out;
    }
    DATA.features.forEach((f) => { f.geometry.coordinates = densify(f.geometry.coordinates); });

    const map = new maplibregl.Map({
      container: "map",
      center: [10, 20],
      zoom: 1.3,
      style: {
        version: 8,
        projection: { type: "globe" },
        sky: { "atmosphere-blend": ["interpolate", ["linear"], ["zoom"], 0, 1, 5, 1, 7, 0] },
        light: { anchor: "map", intensity: 0.4 },
        sources: {
          osm: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
                 tileSize: 256, maxzoom: 19,
                 attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' },
        },
        layers: [{ id: "osm", type: "raster", source: "osm" }],
      },
    });
    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }));

    let selected = null;
    let popup = null;

    function applyPaint() {
      const eq = (s) => ["==", ["get", "slug"], s ?? ""];
      map.setPaintProperty("routes", "line-opacity", selected ? ["case", eq(selected), 0.95, 0.25] : 0.9);
      map.setPaintProperty("routes", "line-width", ["case", eq(selected), 5, 3.5]);
    }

    function select(slug, at) {
      selected = slug;
      applyPaint();
      const f = DATA.features.find((x) => x.properties.slug === slug);
      const coords = f.geometry.coordinates;
      const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
      map.fitBounds(bounds, { padding: 60, maxZoom: 6 });
      if (popup) popup.remove();
      popup = new maplibregl.Popup()
        .setLngLat(at || coords[Math.floor(coords.length / 2)])
        .setHTML(`<strong>${f.properties.name}</strong>`)
        .addTo(map);
    }

    // Gotcha 3: style.load, not load — don't let a slow tile host block the UI.
    map.once("style.load", () => {
      map.addSource("routes", { type: "geojson", data: DATA });
      map.addLayer({ id: "routes-casing", type: "line", source: "routes",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 7, "line-opacity": 0.9 } });
      map.addLayer({ id: "routes", type: "line", source: "routes",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-width": 3.5, "line-opacity": 0.9,
                 "line-color": ["match", ["get", "category"], "a", COLORS.a, "b", COLORS.b, COLORS.c] } });

      const list = document.getElementById("list");
      for (const f of DATA.features) {
        const b = document.createElement("button");
        b.innerHTML = `<span class="dot" style="background:${COLORS[f.properties.category]}"></span>${f.properties.name}`;
        b.onclick = () => select(f.properties.slug);
        list.append(b);
      }

      map.on("click", "routes", (e) => { e.preventDefault(); select(e.features[0].properties.slug, e.lngLat); });
      map.on("click", (e) => {
        if (e.defaultPrevented || !selected) return;
        selected = null;
        if (popup) popup.remove();
        applyPaint();
      });
      map.on("mousemove", "routes", () => { map.getCanvas().style.cursor = "pointer"; });
      map.on("mouseleave", "routes", () => { map.getCanvas().style.cursor = ""; });
    });
  </script>
</body>
</html>
