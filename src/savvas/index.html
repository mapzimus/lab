<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Savvas Extraction · WIP · Mapzimus</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --ink:#e8eaf0; --muted:#9aa3b2; --accent:#7cc4ff; --line:#242936; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 ui-sans-serif, system-ui, sans-serif; }
  header { padding:24px 20px 8px; max-width:960px; margin:0 auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  .wip { color:var(--muted); font-size:13px; }
  .wip b { color:#ffcf7c; }
  main { max-width:960px; margin:0 auto; padding:12px 20px 60px; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 20px; }
  input, select { background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; }
  input { flex:1; min-width:220px; }
  .course { margin-bottom:28px; }
  .course h2 { font-size:17px; color:var(--accent); border-bottom:1px solid var(--line); padding-bottom:6px; }
  .topic { margin:10px 0 4px; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  table { width:100%; border-collapse:collapse; }
  td { padding:5px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  td.code { color:var(--muted); white-space:nowrap; width:70px; font-family:ui-monospace, monospace; font-size:13px; }
  .count { color:var(--muted); font-size:13px; }
  mark { background:#3d4b1f; color:#e8f0c8; border-radius:3px; padding:0 2px; }
</style>
</head>
<body>
<header>
  <h1>Savvas Curriculum Extraction</h1>
  <div class="wip"><b>Work in progress</b> — live view of <code>savvas_sections.json</code> from the extraction pipeline. Posted here temporarily for review.</div>
</header>
<main>
  <div class="controls">
    <input id="q" type="search" placeholder="Search section titles…">
    <select id="course"><option value="">All courses</option></select>
    <span class="count" id="count"></span>
  </div>
  <div id="out"></div>
</main>
<script>
let data = [];
const q = document.getElementById('q'), courseSel = document.getElementById('course'),
      out = document.getElementById('out'), count = document.getElementById('count');

fetch('sections.json').then(r => r.json()).then(d => {
  data = d;
  [...new Set(d.map(s => s.course))].forEach(c => {
    const o = document.createElement('option'); o.value = o.textContent = c; courseSel.appendChild(o);
  });
  render();
});

function esc(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render() {
  const term = q.value.trim().toLowerCase();
  const rows = data.filter(s =>
    (!courseSel.value || s.course === courseSel.value) &&
    (!term || s.section_title.toLowerCase().includes(term) || s.section_code.includes(term)));
  count.textContent = rows.length + ' of ' + data.length + ' sections';
  const byCourse = {};
  rows.forEach(s => ((byCourse[s.course] ??= {})[s.topic] ??= []).push(s));
  out.innerHTML = Object.entries(byCourse).map(([c, topics]) => `
    <section class="course"><h2>${esc(c)}</h2>` +
    Object.entries(topics).map(([t, secs]) => `
      <div class="topic">Topic ${esc(t)}</div>
      <table>${secs.map(s => {
        let title = esc(s.section_title);
        if (term) title = title.replace(new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','ig'), '<mark>$1</mark>');
        return `<tr><td class="code">${esc(s.section_code)}</td><td>${title}</td></tr>`;
      }).join('')}</table>`).join('') + '</section>').join('') || '<p class="count">No matches.</p>';
}
q.addEventListener('input', render);
courseSel.addEventListener('change', render);
</script>
</body>
</html>
