<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MCAS Grade 10 Math — Item Bank</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Ctext x='16' y='23' font-size='19' font-family='Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="katex/katex.min.css">
<script src="katex/katex.min.js"></script>
<style>
  :root{--bg:#f6f7f9;--card:#fff;--line:#e2e5ea;--ink:#1c2127;--muted:#6b7280;--accent:#2b6cb0;--ok:#15803d;--warn:#b45309}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  h1{font-size:17px;margin:0 14px 0 0}h1 .g{color:var(--accent)}
  #search{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  select{font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fff;max-width:230px}
  label.chk{display:inline-flex;gap:6px;align-items:center;cursor:pointer;user-select:none;font-size:13px}
  .filters{margin-top:8px}
  .filters .f{display:flex;flex-direction:column;gap:2px}
  .filters .f span{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding-left:2px}
  #count{font-size:12px;color:var(--muted);margin-left:auto}
  main{max-width:900px;margin:18px auto;padding:0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
  .chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
  .c-src{background:#eef2ff;color:#4338ca}.c-src.practice{background:#fef3c7;color:#92400e}
  .c-yr{background:#f1f5f9;color:#334155}
  .c-std{background:#ecfdf5;color:#065f46;font-family:ui-monospace,Menlo,monospace}
  .c-rc{background:#f5f3ff;color:#6d28d9}.c-dok{background:#fff7ed;color:#9a3412;cursor:help}
  .c-sav{background:#e0f2fe;color:#075985}.c-sav.unmapped{background:#f1f5f9;color:#94a3b8}
  .c-ans{background:#dcfce7;color:#166534}.c-fw{background:#f8fafc;color:#64748b;border:1px solid var(--line)}
  .c-leg{background:#fafafa;color:#9ca3af;font-family:ui-monospace,monospace}
  .stem{font-size:16.5px;line-height:1.6}
  .choices{margin-top:12px;display:grid;gap:7px}
  .choice{display:flex;gap:9px;font-size:15.5px;padding:5px 9px;border-radius:8px;border:1px solid transparent;align-items:flex-start}
  .choice .ltr{font-weight:700;color:var(--muted);min-width:18px;padding-top:2px}
  .choice .cbody{flex:1}
  .choice.correct{background:#f0fdf4;border-color:#bbf7d0}.choice.correct .ltr{color:var(--ok)}
  .figwrap{margin:12px 0;text-align:center}
  .fig{display:block;margin:6px auto;max-width:100%;max-height:460px;height:auto;border:1px solid var(--line);border-radius:8px;background:#fff;padding:4px}
  .choice .figwrap{margin:2px 0;text-align:left}
  .choice .fig{margin:0;max-height:240px;max-width:340px}
  .fig.fallback{max-height:none;width:100%}
  .nofig{display:inline-block;background:#fff7ed;color:#9a3412;padding:1px 8px;border-radius:5px;font-size:12px}
  .katex{font-size:1.02em}.katex-display{margin:0;display:inline}  /* keep math inline-sized, never oversized */
  .katex-display>.katex{display:inline}
  .dokrat{font-size:12px;color:var(--muted);margin-top:8px;font-style:italic;display:none}
  /* DESE per-item performance (school vs district vs state) */
  .perf{margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);max-width:360px}
  .perf-h{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .perf-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
  .perf-lab{width:62px;color:var(--muted);flex:none}
  .perf-track{flex:1;height:9px;background:#eef1f5;border-radius:5px;overflow:hidden}
  .perf-track i{display:block;height:100%;border-radius:5px;min-width:2px}
  .perf-val{width:34px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);flex:none}
  .perf-row.school .perf-track i{background:var(--accent)}
  .perf-row.district .perf-track i{background:#7aa7d4}
  .perf-row.state .perf-track i{background:#b6bcc6}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .note{font-size:12px;color:var(--warn);text-align:center;margin:8px 0}
  /* analytics view */
  #analytics{display:none}
  body.analytics #results{display:none}
  body.analytics #analytics{display:block}
  .an-scope{color:var(--muted);font-size:13px;margin:4px 0 18px}
  .an-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:18px}
  .an-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .an-card.wide{grid-column:1/-1}
  .an-card h3{margin:0 0 4px;font-size:15px}
  .an-sub{color:var(--muted);font-size:12px;margin:0 0 12px}
  .an-row{display:flex;align-items:center;gap:10px;margin:5px 0;font-size:13px}
  .an-lab{flex:none;width:150px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .an-lab small{color:var(--muted)}
  .an-track{flex:1;height:14px;background:#eef1f5;border-radius:7px;overflow:hidden;position:relative}
  .an-track i{display:block;height:100%;border-radius:7px;background:var(--accent);min-width:2px}
  .an-track.gap i{background:var(--warn)}
  .an-track .stbar{position:absolute;top:0;height:100%;width:2px;background:#111;opacity:.55}
  .an-val{flex:none;width:96px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}
  .an-val .mut{color:var(--muted)}
  .an-focus{border-left:3px solid var(--warn);padding-left:8px;background:#fffbeb}
  .an-dist{display:flex;gap:16px;align-items:flex-end;height:140px;padding:8px 4px 0}
  .an-bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;height:100%}
  .an-bar .col{width:46px;background:var(--accent);border-radius:6px 6px 0 0;min-height:3px;display:flex;align-items:flex-start;justify-content:center}
  .an-bar .col span{color:#fff;font-size:11px;font-weight:700;margin-top:3px}
  .an-bar .k{font-weight:700;color:var(--ink)}
  .an-bar .n{color:var(--muted);font-size:12px}
  .an-take{font-size:13px;color:var(--ink);background:#f1f5f9;border-radius:8px;padding:9px 12px;margin-top:12px;line-height:1.45}
  .an-mini{font-size:12px;color:var(--muted);margin-top:8px;display:flex;flex-wrap:wrap;gap:4px 14px}
  .viewbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600;color:var(--accent)}
  .viewbtn:hover{background:#f0f5fb}
  /* selection + export */
  .card{position:relative}
  .selbox{position:absolute;top:14px;right:14px;width:17px;height:17px;cursor:pointer}
  .card.sel{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent)}
  #exportbar{position:fixed;bottom:0;left:0;right:0;z-index:30;background:#1c2127;color:#fff;
    display:none;gap:10px;align-items:center;padding:10px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.25)}
  #exportbar.on{display:flex}
  #exportbar b{font-size:14px}#exportbar .sp{flex:1}
  #exportbar button{font-size:13px;padding:7px 12px;border:0;border-radius:7px;cursor:pointer;background:var(--accent);color:#fff;font-weight:600}
  #exportbar button.ghost{background:#374151}
  #printroot{display:none}
  @media print{
    header,#exportbar,main{display:none !important}
    body{background:#fff}
    #printroot{display:block;color:#000;font-size:13px}
    .pw-head{margin-bottom:16px}
    .pw-head h2{margin:0 0 6px;font-size:18px}
    .pw-meta{display:flex;gap:32px;font-size:13px;border-bottom:1.5px solid #000;padding-bottom:8px}
    .pw-item{break-inside:avoid;page-break-inside:avoid;margin:0 0 20px}
    .pw-num{font-weight:700;margin-right:6px}
    .pw-item .stem{font-size:13.5px}
    .pw-item .fig{max-height:330px;border:0;padding:0}
    .pw-item .choice{font-size:13px}.pw-item .choice .fig{max-height:200px}
    .pw-item .choice.correct{background:none;border-color:transparent}
    .ak-item{font-size:12.5px;padding:3px 0;border-bottom:1px solid #eee}
    @page{margin:.7in}
  }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1>MCAS <span class="g">Grade 10</span> Math — Item Bank</h1>
    <input id="search" placeholder="Search question text…">
    <label class="chk"><input type="checkbox" id="pre2017"> Show pre-2017 (pre–Common Core)</label>
    <label class="chk"><input type="checkbox" id="showans"> Show answers</label>
    <button id="viewtoggle" class="viewbtn" title="Toggle data analytics">📊 Analytics</button>
    <span id="count"></span>
  </div>
  <div class="row filters">
    <label class="f"><span>Source</span><select id="f-source"></select></label>
    <label class="f"><span>Year</span><select id="f-year"></select></label>
    <label class="f"><span>Course</span><select id="f-course"></select></label>
    <label class="f"><span>Chapter</span><select id="f-chapter"></select></label>
    <label class="f"><span>DOK</span><select id="f-dok"></select></label>
    <label class="f"><span>Reporting cat.</span><select id="f-rc"></select></label>
    <label class="f"><span>Standard</span><select id="f-std"></select></label>
    <label class="f"><span>Type</span><select id="f-type"></select></label>
    <label class="f"><span>Figures</span><select id="f-fig"></select></label>
    <label class="f"><span>Performance</span><select id="f-perf">
      <option value="">Any performance</option>
      <option value="has">Has DESE data</option>
      <option value="below">School below state</option>
      <option value="lo50">School &lt; 50% correct</option>
      <option value="gap15">Big gap (≥15 pts below state)</option></select></label>
    <label class="f"><span>Sort</span><select id="f-sort">
      <option value="year_d">Year ↓ (newest)</option><option value="year">Year ↑</option>
      <option value="chapter">Chapter</option>
      <option value="dok">DOK ↓</option>
      <option value="std">Standard</option><option value="rc">Reporting category</option>
      <option value="perf_lo">School % ↑ (hardest)</option>
      <option value="gap_hi">School−State gap ↓ (worst)</option></select></label>
  </div>
</header>
<main><div id="results"></div><div id="analytics"></div></main>

<div id="exportbar">
  <b id="selcount">0 selected</b>
  <span class="sp"></span>
  <button id="ex-ws">🖨 Print worksheet</button>
  <button id="ex-ak">🔑 Print answer key</button>
  <button id="ex-csv">⬇ CSV</button>
  <button id="ex-clear" class="ghost">Clear</button>
</div>
<div id="printroot"></div>

<script src="data.js"></script>
<script>
const DATA = window.MCAS_DATA || [];
let SHOW_ANS = false;   // classroom-safe: answers hidden by default
let VIEW = 'items';     // 'items' grid | 'analytics' panel
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function set(el, html){ el.textContent=''; el.insertAdjacentHTML('beforeend', html); }

// render prose + inline $...$ math; [[figure]] -> figHtml; \$ \% \& \# -> literal
function renderLatex(s, figHtml){
  s = s==null?'':String(s);
  let out='', prose='';
  const flush=()=>{ if(!prose) return;
    let p = esc(prose).replace(/\[\[figure\]\]/g, figHtml||'<span class="nofig">[diagram]</span>').replace(/\n/g,'<br>');
    // emphasis the vision pass captured as markdown/LaTeX in PROSE (outside $...$) -> real bold/italic
    p = p.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
         .replace(/\\textbf\s*\{([^{}]*)\}/g, '<b>$1</b>')
         .replace(/\\(?:textit|emph|textsl)\s*\{([^{}]*)\}/g, '<i>$1</i>')
         .replace(/\\textrm\s*\{([^{}]*)\}/g, '$1');
    out += p; prose=''; };
  const tex=(t)=>{ try{ return katex.renderToString(t, {throwOnError:false, displayMode:false, errorColor:'#c00'}); }
                   catch(e){ return '<code>'+esc(t)+'</code>'; } };
  for(let i=0;i<s.length;i++){
    const ch=s[i], nx=s[i+1];
    if(ch==='\\' && (nx==='$'||nx==='%'||nx==='&'||nx==='#')){ prose+=nx; i++; continue; }
    if(ch==='$'){                                  // handle $$display$$ AND $inline$; always render inline-sized
      const disp = nx==='$';
      const open = disp ? i+2 : i+1;
      const close = s.indexOf(disp ? '$$' : '$', open);
      if(close>=open){ flush(); out += tex(s.slice(open, close)); i = disp ? close+1 : close; continue; }
      // no closing delimiter -> treat this $ as literal text (prevents mis-pairing across the rest of the string)
    }
    prose+=ch;
  }
  flush(); return out;
}
const figImg = (src, alt, extra) =>
  '<div class="figwrap"><img class="fig'+(extra||'')+'" loading="lazy" src="figures/'+esc(src)+'" alt="'+esc(alt)+'"></div>';

// stem: crisp KaTeX, [[figure]] -> the single figure crop (or full-item fallback)
function renderStem(it){
  let figHtml='';
  if(it.figure) figHtml = figImg(it.figure, 'figure '+it.uid);
  else if(it.has_figure && it.item_image && !it.choice_figs)
    figHtml = '<div class="figwrap"><img class="fig fallback" loading="lazy" src="'+esc(it.item_image)+'" alt="item '+esc(it.uid)+'"></div>';
  let html = renderLatex(it.latex, figHtml);
  if(figHtml && !(it.latex||'').includes('[[figure]]')) html += figHtml;   // append if no placeholder
  return html;
}
// choices: KaTeX; per-choice [[figure]] -> that choice's crop
function renderChoices(it, plain){
  if(!it.choices) return '';
  return '<div class="choices">'+Object.keys(it.choices).map(k=>{
    const ok = !plain && SHOW_ANS && it.answer && String(it.answer).toUpperCase().split(/[ ,;]+/).includes(k);
    let inner;
    if(it.choice_figs && it.choice_figs[k]) inner = figImg(it.choice_figs[k], 'choice '+k);
    else inner = renderLatex(it.choices[k], it.figure?figImg(it.figure,'figure'):'');
    return '<div class="choice'+(ok?' correct':'')+'"><span class="ltr">'+k+'.</span><span class="cbody">'+inner+'</span></div>';
  }).join('')+'</div>';
}

function chapterChip(it){
  if(it.chapter!=null && it.chapter_course){
    const lbl = (it.chapter_course||'').replace('Algebra 1','Alg 1').replace('Geometry','Geo')
              + ' · Ch ' + it.chapter + (it.chapter_name?' — '+it.chapter_name:'');
    const lo = (it.chapter_conf!=null && it.chapter_conf<0.5);
    const conf = it.chapter_conf!=null ? ' ('+Math.round(it.chapter_conf*100)+'% conf)' : '';
    return '<span class="chip c-sav'+(lo?' unmapped':'')+'" title="enVision chapter'+esc(conf)+(lo?' — low confidence, review':'')+'">'+esc(lbl)+'</span>';
  }
  if(it.out_of_scope) return '<span class="chip c-sav unmapped" title="'+esc(it.oos_reason||'No Algebra 1 / Geometry chapter')+'">out of scope</span>';
  return '';
}

function perfBar(it){
  const p = it.perf; if(!p) return '';
  if(p.school==null && p.district==null && p.state==null) return '';
  const row=(cls,lab,v)=> '<div class="perf-row '+cls+'"><span class="perf-lab">'+lab+'</span>'
    +'<span class="perf-track"><i style="width:'+(v==null?0:Math.max(0,Math.min(100,v)))+'%"></i></span>'
    +'<span class="perf-val">'+(v==null?'—':v+'%')+'</span></div>';
  return '<div class="perf" title="Percent of possible points earned — DESE MCAS item analysis, Lynn English / Lynn / Massachusetts">'
    +'<div class="perf-h">% correct · school vs district vs state</div>'
    +row('school','School',p.school)+row('district','District',p.district)+row('state','State',p.state)
    +'</div>';
}

function card(it){
  const chips=[
    '<span class="chip c-src '+(it.source==='practice'?'practice':'')+'">'+(it.source==='practice'?'PRACTICE':'RELEASED')+'</span>',
    '<span class="chip c-yr">'+it.year+' · #'+it.item_no+'</span>',
    chapterChip(it),
    it.dok?'<span class="chip c-dok" title="'+esc(it.dok_rationale||'')+'">DOK '+esc(it.dok)+'</span>':'',
    it.standard?'<span class="chip c-std">'+esc(it.standard)+'</span>':'',
    it.reporting_category?'<span class="chip c-rc">'+esc(it.reporting_category)+'</span>':'',
    it.item_type?'<span class="chip c-fw">'+esc(it.item_type)+'</span>':'',
    (SHOW_ANS&&it.answer)?'<span class="chip c-ans">Ans '+esc(it.answer)+'</span>':'',
  ].join('');
  const body = '<div class="stem">'+renderStem(it)+'</div>'+renderChoices(it)+perfBar(it);
  const seld = SEL.has(it.uid);
  return '<div class="card'+(seld?' sel':'')+'">'
    +'<input type="checkbox" class="selbox" title="Select for worksheet/export" data-uid="'+esc(it.uid)+'"'+(seld?' checked':'')+'>'
    +'<div class="meta">'+chips+'</div>'+body+'</div>';
}

const uniq = key => [...new Set(DATA.map(d=>d[key]).filter(v=>v!=null&&v!==''))];
function fill(sel, vals, label){
  const cur=$(sel).value;
  set($(sel), '<option value="">'+label+'</option>'+vals.map(v=>'<option>'+esc(v)+'</option>').join(''));
  if(vals.map(String).includes(cur)) $(sel).value=cur;
}
function buildFilters(){
  fill('#f-source', uniq('source').sort(), 'All sources');
  fill('#f-year', uniq('year').sort((a,b)=>b-a), 'All years');
  fill('#f-rc', uniq('reporting_category').sort(), 'All categories');
  fill('#f-std', uniq('standard').sort(), 'All standards');
  fill('#f-type', uniq('item_type').sort(), 'All types');
  set($('#f-dok'), '<option value="">Any DOK</option><option value="1">DOK 1</option><option value="2">DOK 2</option><option value="3">DOK 3</option>');
  set($('#f-fig'), '<option value="">Any</option><option value="y">Has figure</option><option value="n">No figure</option>');
  // Course + an "out of scope" bucket
  const courses = uniq('chapter_course').sort();
  set($('#f-course'), '<option value="">All courses</option>'+courses.map(c=>'<option>'+esc(c)+'</option>').join('')+'<option value="__oos">Out of scope</option>');
  cascadeChapter();
}
function cascadeChapter(){
  const course=$('#f-course').value;
  let chapters = course&&course!=='__oos'
    ? [...new Set(DATA.filter(d=>d.chapter_course===course && d.chapter!=null).map(d=>d.chapter))]
    : [];
  chapters.sort((a,b)=>a-b);
  const nameOf={};
  DATA.forEach(d=>{ if(d.chapter_course===course && d.chapter!=null && d.chapter_name) nameOf[d.chapter]=d.chapter_name; });
  const cur=$('#f-chapter').value;
  set($('#f-chapter'), '<option value="">All chapters</option>'
    +chapters.map(c=>'<option value="'+c+'">Ch '+c+(nameOf[c]?' — '+esc(nameOf[c]):'')+'</option>').join(''));
  if(chapters.map(String).includes(cur)) $('#f-chapter').value=cur; else $('#f-chapter').value='';
  $('#f-chapter').disabled = !(course&&course!=='__oos');
}
const CAP=500;
function apply(){
  const q=$('#search').value.trim().toLowerCase(), pre=$('#pre2017').checked;
  const src=$('#f-source').value, yr=$('#f-year').value, rc=$('#f-rc').value,
        std=$('#f-std').value, ty=$('#f-type').value, fg=$('#f-fig').value, sort=$('#f-sort').value,
        course=$('#f-course').value, chapter=$('#f-chapter').value, dok=$('#f-dok').value,
        perf=$('#f-perf').value;
  let rows=DATA.filter(d=>{
    if(!pre && !d.default_visible) return false;
    if(src && d.source!==src) return false;
    if(yr && String(d.year)!==yr) return false;
    if(rc && d.reporting_category!==rc) return false;
    if(std && d.standard!==std) return false;
    if(ty && d.item_type!==ty) return false;
    if(dok && String(d.dok)!==dok) return false;
    if(course==='__oos'){ if(!d.out_of_scope) return false; }
    else if(course){ if(d.chapter_course!==course) return false;
      if(chapter && String(d.chapter)!==chapter) return false; }
    if(fg==='y' && !d.has_figure) return false;
    if(fg==='n' && d.has_figure) return false;
    if(perf){ const p=d.perf;
      if(perf==='has'){ if(!p) return false; }
      else { if(!p || p.school==null) return false;
        if(perf==='below' && !(p.state!=null && p.school<p.state)) return false;
        if(perf==='lo50' && !(p.school<50)) return false;
        if(perf==='gap15' && !(p.state!=null && (p.state-p.school)>=15)) return false; } }
    if(q && !(d.latex||'').toLowerCase().includes(q)
         && !Object.values(d.choices||{}).join(' ').toLowerCase().includes(q)
         && !(d.standard||'').toLowerCase().includes(q)
         && !(d.chapter_name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const gapOf=x=>(x.perf && x.perf.state!=null && x.perf.school!=null) ? (x.perf.state-x.perf.school) : -1e9;
  const schOf=x=>(x.perf && x.perf.school!=null) ? x.perf.school : 1e9;
  const cmp={
    year:(a,b)=>(a.year-b.year)||(a.item_no-b.item_no),
    year_d:(a,b)=>(b.year-a.year)||(a.item_no-b.item_no),
    std:(a,b)=>String(a.standard).localeCompare(String(b.standard)),
    rc:(a,b)=>String(a.reporting_category).localeCompare(String(b.reporting_category))||(a.year-b.year),
    dok:(a,b)=>((b.dok||0)-(a.dok||0))||(a.year-b.year),
    chapter:(a,b)=>String(a.chapter_course||'~').localeCompare(String(b.chapter_course||'~'))
                   ||((a.chapter==null?99:a.chapter)-(b.chapter==null?99:b.chapter))||(a.year-b.year),
    perf_lo:(a,b)=>(schOf(a)-schOf(b))||(b.year-a.year),
    gap_hi:(a,b)=>(gapOf(b)-gapOf(a))||(b.year-a.year),
  }[sort];
  rows.sort(cmp);
  if(VIEW==='analytics'){ renderAnalytics(rows); $('#count').textContent=rows.length+' items'; return; }
  const total=rows.length, shown=rows.slice(0,CAP);
  $('#count').textContent=total+' items'+(total>CAP?' (showing '+CAP+')':'');
  set($('#results'),
    (total>CAP?'<div class="note">Showing first '+CAP+' of '+total+' — refine filters to narrow.</div>':'')
    + (shown.length? shown.map(card).join('') : '<div class="empty">No items match.</div>'));
}

// ---- analytics view ----
const mean = a => a.length ? a.reduce((s,x)=>s+x,0)/a.length : null;
const CHNAME = {};  // "course|ch" -> name
DATA.forEach(d=>{ if(d.chapter!=null && d.chapter_course && d.chapter_name) CHNAME[d.chapter_course+'|'+d.chapter]=d.chapter_name; });
const shortCourse = c => (c||'').replace('Algebra 1','Alg1').replace('Geometry','Geo');

function renderAnalytics(rows){
  const n = rows.length;
  const perfRows = rows.filter(d=>d.perf && d.perf.school!=null);

  // 1) coverage by chapter, per course
  const byCourse={};
  rows.forEach(d=>{ if(d.chapter!=null && d.chapter_course){
    (byCourse[d.chapter_course]=byCourse[d.chapter_course]||{});
    byCourse[d.chapter_course][d.chapter]=(byCourse[d.chapter_course][d.chapter]||0)+1; }});
  let covHtml='';
  Object.keys(byCourse).sort().forEach(course=>{
    const chs=byCourse[course], maxc=Math.max(...Object.values(chs),1);
    const tot=Object.values(chs).reduce((s,x)=>s+x,0);
    const body=Object.keys(chs).map(Number).sort((a,b)=>a-b).map(ch=>{
      const nm=CHNAME[course+'|'+ch]||'';
      return '<div class="an-row"><span class="an-lab">Ch '+ch+' <small>'+esc(nm)+'</small></span>'
        +'<span class="an-track"><i style="width:'+(100*chs[ch]/maxc)+'%"></i></span>'
        +'<span class="an-val">'+chs[ch]+'</span></div>';
    }).join('');
    covHtml+='<div class="an-card"><h3>'+esc(course)+' — topic coverage</h3>'
      +'<p class="an-sub">'+tot+' items across '+Object.keys(chs).length+' chapters</p>'+body+'</div>';
  });
  if(!covHtml) covHtml='<div class="an-card"><h3>Topic coverage</h3><p class="an-sub">No chapter-mapped items in this selection.</p></div>';

  // 2) performance by topic — "where to focus"
  let perfHtml='';
  if(perfRows.length){
    const g={};
    perfRows.forEach(d=>{ const k=d.chapter_course+'|'+d.chapter; if(d.chapter==null) return;
      (g[k]=g[k]||{course:d.chapter_course,ch:d.chapter,sch:[],st:[]});
      g[k].sch.push(d.perf.school); if(d.perf.state!=null) g[k].st.push(d.perf.state); });
    let arr=Object.values(g).map(x=>({course:x.course,ch:x.ch,n:x.sch.length,asch:mean(x.sch),ast:mean(x.st)}))
                            .filter(x=>x.asch!=null && x.ch!=null);
    arr.forEach(x=>x.gap=(x.ast!=null? x.ast-x.asch : 0));
    arr.sort((a,b)=>b.gap-a.gap);
    const oSch=mean(perfRows.map(d=>d.perf.school));
    const oSt=mean(perfRows.filter(d=>d.perf.state!=null).map(d=>d.perf.state));
    const maxgap=Math.max(...arr.map(x=>x.gap),1);
    const body=arr.map((x,i)=>{
      const nm=CHNAME[x.course+'|'+x.ch]||'', foc=i<3 && x.gap>0;
      return '<div class="an-row'+(foc?' an-focus':'')+'"><span class="an-lab">'+esc(shortCourse(x.course))+' Ch '+x.ch+' <small>'+esc(nm)+'</small></span>'
        +'<span class="an-track gap"><i style="width:'+(100*Math.max(0,x.gap)/maxgap)+'%"></i></span>'
        +'<span class="an-val">'+Math.round(x.asch)+'% <span class="mut">/ '+(x.ast!=null?Math.round(x.ast)+'%':'—')+'</span></span></div>';
    }).join('');
    const tops=arr.filter(x=>x.gap>0).slice(0,3).map(x=>{
      const nm=CHNAME[x.course+'|'+x.ch]; return esc(shortCourse(x.course))+' Ch '+x.ch+(nm?' ('+esc(nm)+')':'')+' −'+Math.round(x.gap)+'pts'; });
    perfHtml='<div class="an-card wide"><h3>Where LEHS needs to focus hardest</h3>'
      +'<p class="an-sub">Avg % correct by topic, LEHS / State. Bar length = gap below the state average (longer = bigger gap). '
      +'Overall: <b>LEHS '+Math.round(oSch)+'%</b> vs State '+Math.round(oSt)+'%.</p>'
      +body
      +(tops.length?'<div class="an-take"><b>Biggest gaps:</b> '+tops.join(' · ')+'</div>':'')
      +'</div>';
  }

  // 3) answer distribution
  const LET=['A','B','C','D'], dist={A:0,B:0,C:0,D:0}; let known=0;
  rows.forEach(d=>{ const a=(d.answer==null?'':String(d.answer)).trim().toUpperCase();
    if(LET.includes(a) && d.choices){ dist[a]++; known++; }});
  let distHtml;
  if(known){
    const maxd=Math.max(...LET.map(k=>dist[k]),1);
    const bars=LET.map(k=>{ const pc=Math.round(100*dist[k]/known);
      return '<div class="an-bar"><div class="col" style="height:'+(100*dist[k]/maxd)+'%"><span>'+pc+'%</span></div>'
        +'<div class="k">'+k+'</div><div class="n">'+dist[k]+'</div></div>'; }).join('');
    const exp=known/4, chi=LET.reduce((s,k)=>s+Math.pow(dist[k]-exp,2)/exp,0);
    const top=LET.slice().sort((a,b)=>dist[b]-dist[a])[0];
    const verdict = chi<7.81
      ? 'Correct answers are spread evenly across A–D — no statistically detectable bias, exactly as a fair test should look. A test-taker gains nothing by always guessing one letter.'
      : 'Statistically detectable skew toward <b>'+top+'</b> ('+Math.round(100*dist[top]/known)+'% of keys) — still a weak edge in practice.';
    distHtml='<div class="an-card"><h3>Answer distribution</h3>'
      +'<p class="an-sub">'+known+' multiple-choice items with a known answer key</p>'
      +'<div class="an-dist">'+bars+'</div>'
      +'<div class="an-take">'+verdict+' <span class="mut">(χ²≈'+chi.toFixed(1)+' vs. uniform, 3 d.f.; ~7.8 = 5% significance)</span></div></div>';
  } else {
    distHtml='<div class="an-card"><h3>Answer distribution</h3>'
      +'<p class="an-sub">No MC items with a known answer key in this selection.</p></div>';
  }

  const scope='Analytics — '+n+' items in current filter'
    + (perfRows.length? ' · '+perfRows.length+' with DESE performance data' : ' · no DESE performance data in this selection');
  set($('#analytics'), '<div class="an-scope">'+esc(scope)+'</div>'
    + '<div class="an-grid">'+(perfHtml||'')+covHtml+distHtml+'</div>');
}

// ---- selection + export (no libraries) ----
const SEL = new Set();
function updateBar(){ $('#selcount').textContent=SEL.size+' selected'; $('#exportbar').classList.toggle('on', SEL.size>0); }
function selItems(){ return DATA.filter(d=>SEL.has(d.uid)).sort((a,b)=>(a.year-b.year)||(a.item_no-b.item_no)); }
function onSel(e){
  const cb=e.target.closest&&e.target.closest('.selbox'); if(!cb) return;
  if(cb.checked) SEL.add(cb.dataset.uid); else SEL.delete(cb.dataset.uid);
  const card=cb.closest('.card'); if(card) card.classList.toggle('sel', cb.checked);
  updateBar();
}
function printHTML(html){ set($('#printroot'), html); window.print(); }
function buildWorksheet(){
  const items=selItems(); if(!items.length) return;
  const head='<div class="pw-head"><h2>MCAS Grade 10 Math</h2>'
    +'<div class="pw-meta"><span>Name: ______________________</span><span>Date: ____________</span>'
    +'<span>'+items.length+' questions</span></div></div>';
  const body=items.map((it,i)=>'<div class="pw-item"><span class="pw-num">'+(i+1)+'.</span>'
    +'<span class="stem">'+renderStem(it)+'</span>'+renderChoices(it,true)+'</div>').join('');
  printHTML(head+body);   // worksheet NEVER shows answers (plain choices, no Ans chip)
}
function buildAnswerKey(){
  const items=selItems(); if(!items.length) return;
  const sv=it=>it.chapter!=null?(' · '+(it.chapter_course||'').replace('Algebra 1','Alg1').replace('Geometry','Geo')+' Ch '+it.chapter):'';
  const body=items.map((it,i)=>'<div class="ak-item"><b>'+(i+1)+'.</b> <b>'+esc(it.answer||'(open response)')+'</b>'
    +(it.standard?' · '+esc(it.standard):'')+(it.dok?' · DOK '+esc(it.dok):'')+esc(sv(it))
    +' <span style="color:#888">('+esc(it.year)+' #'+esc(it.item_no)+')</span></div>').join('');
  printHTML('<div class="pw-head"><h2>Answer Key — MCAS Grade 10 Math</h2></div>'+body);
}
function csvCell(v){ if(v==null) v=''; if(typeof v==='object') v=JSON.stringify(v); v=String(v);
  return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function buildCSV(){
  const rows=selItems(); if(!rows.length) return;
  const cols=['uid','year','item_no','source','standard','legacy_std','reporting_category','item_type','answer','dok','dok_rationale','chapter_course','chapter','chapter_name','chapter_conf','out_of_scope','oos_reason','has_figure','figure_type','latex','choices'];
  const lines=[cols.join(',')].concat(rows.map(d=>cols.map(c=>csvCell(d[c])).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='mcas_g10_selection.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}
let t; const deb=()=>{ clearTimeout(t); t=setTimeout(apply,180); };
window.addEventListener('DOMContentLoaded',()=>{
  buildFilters();
  ['#f-source','#f-year','#f-rc','#f-std','#f-type','#f-fig','#f-sort','#f-dok','#f-chapter','#f-perf'].forEach(s=>$(s).addEventListener('change',apply));
  $('#f-course').addEventListener('change',()=>{ cascadeChapter(); apply(); });
  $('#viewtoggle').addEventListener('click',()=>{
    VIEW = VIEW==='items' ? 'analytics' : 'items';
    document.body.classList.toggle('analytics', VIEW==='analytics');
    $('#viewtoggle').textContent = VIEW==='analytics' ? '📋 Items' : '📊 Analytics';
    apply();
  });
  $('#pre2017').addEventListener('change',apply);
  $('#showans').addEventListener('change',e=>{ SHOW_ANS=e.target.checked; apply(); });
  $('#search').addEventListener('input',deb);
  $('#results').addEventListener('change', onSel);
  $('#ex-ws').addEventListener('click', buildWorksheet);
  $('#ex-ak').addEventListener('click', buildAnswerKey);
  $('#ex-csv').addEventListener('click', buildCSV);
  $('#ex-clear').addEventListener('click', ()=>{ SEL.clear(); updateBar(); apply(); });
  apply();
});
</script>
