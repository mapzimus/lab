<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Practice Problems</title>
<meta name="description" content="Auto-generated math practice — arithmetic, integers, and one- and two-step equations — with instant checking, worked answers, and a running score. Fully client-side.">
<style>
  /* ---- Theme tokens ---- */
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 20px 48px; }
  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }
  .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 9px; padding: 9px 14px; font-size: .86rem; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; font-weight: 600; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); color: var(--accent-ink); }
  footer.app { margin-top: 22px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }

  .label { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 14px 0 8px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
  .pill { cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 7px 14px; font-weight: 600; font-size: .85rem; }
  .pill:hover { border-color: var(--accent); }
  .pill[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 22px; text-align: center; margin: 18px 0; }
  .prompt { color: var(--muted); font-size: .95rem; margin-bottom: 8px; }
  .problem { font-size: 2.4rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; word-break: break-word; }
  .answerrow { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
  input[type=number] { width: 130px; padding: 11px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); border-radius: 9px; font-size: 1.15rem; text-align: center; font-family: var(--sans); }
  input[type=number]:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .feedback { min-height: 1.6em; font-weight: 700; margin-top: 12px; font-size: 1.05rem; }
  .feedback.ok { color: var(--ok); }
  .feedback.no { color: var(--danger); }
  .reveal { margin-top: 10px; color: var(--text); font-size: 1rem; }
  .reveal b { color: var(--accent); }
  .steps { color: var(--muted); font-size: .9rem; margin-top: 4px; }
  .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .score { text-align: center; color: var(--muted); font-size: .85rem; margin-top: 16px; }

  @media (max-width: 480px) {
    .problem { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">← max</a>
      <h1>Practice Problems</h1>
      <p>Auto-generated math practice with instant checking and worked answers. Pick a type and difficulty, then solve.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">🌗 Theme</button>
  </header>

  <div class="label" id="typesLabel">Type</div>
  <div class="pills" id="types" role="group" aria-labelledby="typesLabel">
    <button class="pill" data-type="arith" aria-pressed="true" type="button">Arithmetic</button>
    <button class="pill" data-type="int" aria-pressed="false" type="button">Integers</button>
    <button class="pill" data-type="one" aria-pressed="false" type="button">One-step eqns</button>
    <button class="pill" data-type="two" aria-pressed="false" type="button">Two-step eqns</button>
  </div>
  <div class="label" id="diffsLabel">Difficulty</div>
  <div class="pills" id="diffs" role="group" aria-labelledby="diffsLabel">
    <button class="pill" data-diff="easy" aria-pressed="true" type="button">Easy</button>
    <button class="pill" data-diff="med" aria-pressed="false" type="button">Medium</button>
    <button class="pill" data-diff="hard" aria-pressed="false" type="button">Hard</button>
  </div>

  <div class="card">
    <div class="prompt" id="prompt">Compute:</div>
    <div class="problem" id="problem">—</div>
    <div class="answerrow">
      <input type="number" id="answer" inputmode="numeric" placeholder="Answer" aria-label="Your answer">
      <button class="btn primary" id="check" type="button">Check</button>
    </div>
    <div class="feedback" id="feedback" role="status" aria-live="polite"></div>
    <div class="reveal" id="reveal" style="display:none;"></div>
  </div>

  <div class="controls">
    <button class="btn" id="revealBtn" type="button">Reveal answer</button>
    <button class="btn" id="next" type="button">Next problem ›</button>
  </div>
  <div class="score" id="score">Checked: 0 · Correct: 0</div>

  <footer class="app">Nothing you enter leaves this page · a <strong>max</strong> tool</footer>
</div>

<script>
(function(){
  "use strict";
  var PREFS = "max-practice-problems-prefs";
  var prefs = { lastType: "arith", difficulty: "easy" };
  try {
    var s = JSON.parse(localStorage.getItem(PREFS));
    if (s) prefs = Object.assign(prefs, s);
  } catch (e) {}

  var MAX = { easy: 10, med: 20, hard: 50 };
  var cur = null, total = 0, correct = 0, answered = false;

  function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function rndNon0(min, max) { var v = 0; do { v = rnd(min, max); } while (v === 0); return v; }
  function par(n) { return n < 0 ? "(" + n + ")" : "" + n; }

  function generate() {
    var type = prefs.lastType, max = MAX[prefs.difficulty], fm = Math.min(max, 12), a, b, x, c, op;
    if (type === "arith") {
      op = ["+", "−", "×", "÷"][rnd(0, 3)];
      if (op === "+") { a = rnd(1, max); b = rnd(1, max); return { prompt: "Compute:", q: a + " + " + b, a: a + b, steps: "" }; }
      if (op === "−") { a = rnd(1, max); b = rnd(1, a); return { prompt: "Compute:", q: a + " − " + b, a: a - b, steps: "" }; }
      if (op === "×") { a = rnd(1, fm); b = rnd(1, fm); return { prompt: "Compute:", q: a + " × " + b, a: a * b, steps: "" }; }
      b = rnd(2, 9); x = rnd(1, max); a = b * x; return { prompt: "Compute:", q: a + " ÷ " + b, a: x, steps: "" };
    }
    if (type === "int") {
      op = ["+", "−", "×"][rnd(0, 2)];
      if (op === "×") { a = rndNon0(-fm, fm); b = rndNon0(-fm, fm); return { prompt: "Compute:", q: par(a) + " × " + par(b), a: a * b, steps: "" }; }
      a = rndNon0(-max, max); b = rndNon0(-max, max);
      if (op === "+") return { prompt: "Compute:", q: par(a) + " + " + par(b), a: a + b, steps: "" };
      return { prompt: "Compute:", q: par(a) + " − " + par(b), a: a - b, steps: "" };
    }
    if (type === "one") {
      x = rnd(1, max); var form = ["add", "sub", "mul"][rnd(0, 2)];
      if (form === "add") { b = rnd(1, max); c = x + b; return { prompt: "Solve for x:", q: "x + " + b + " = " + c, a: x, steps: "Subtract " + b + " from both sides." }; }
      if (form === "sub") { b = rnd(1, max); c = x - b; return { prompt: "Solve for x:", q: "x − " + b + " = " + c, a: x, steps: "Add " + b + " to both sides." }; }
      a = rnd(2, 9); c = a * x; return { prompt: "Solve for x:", q: a + "x = " + c, a: x, steps: "Divide both sides by " + a + "." };
    }
    // two-step: ax + b = c
    a = rnd(2, 9); x = rnd(1, max); b = rnd(1, max); c = a * x + b;
    return { prompt: "Solve for x:", q: a + "x + " + b + " = " + c, a: x, steps: "Subtract " + b + ", then divide by " + a + "." };
  }

  function newProblem() {
    cur = generate(); answered = false;
    document.getElementById("prompt").textContent = cur.prompt;
    document.getElementById("problem").textContent = cur.q;
    var inp = document.getElementById("answer"); inp.value = ""; inp.focus();
    var fb = document.getElementById("feedback"); fb.textContent = ""; fb.className = "feedback";
    document.getElementById("reveal").style.display = "none";
  }
  function check() {
    if (!cur) return;
    var raw = document.getElementById("answer").value;
    if (raw === "") return;
    var val = parseFloat(raw), fb = document.getElementById("feedback");
    var right = (val === cur.a);
    if (!answered) { total++; if (right) correct++; answered = true; updateScore(); }
    if (right) { fb.textContent = "✓ Correct!"; fb.className = "feedback ok"; }
    else { fb.textContent = "✗ Not quite — try again or reveal."; fb.className = "feedback no"; }
  }
  function reveal() {
    if (!cur) return;
    var r = document.getElementById("reveal");
    var isEqn = cur.prompt.indexOf("Solve") === 0;
    r.innerHTML = "";
    var ans = document.createElement("b");
    ans.textContent = (isEqn ? "x = " : "= ") + cur.a;
    r.appendChild(ans);
    if (cur.steps) { var p = document.createElement("div"); p.className = "steps"; p.textContent = cur.steps; r.appendChild(p); }
    r.style.display = "block";
  }
  function updateScore() { document.getElementById("score").textContent = "Checked: " + total + " · Correct: " + correct; }

  // type / difficulty pills
  Array.prototype.forEach.call(document.querySelectorAll("#types .pill"), function (b) {
    b.setAttribute("aria-pressed", b.getAttribute("data-type") === prefs.lastType);
    b.onclick = function () {
      prefs.lastType = b.getAttribute("data-type"); save();
      Array.prototype.forEach.call(document.querySelectorAll("#types .pill"), function (x) { x.setAttribute("aria-pressed", x === b); });
      newProblem();
    };
  });
  Array.prototype.forEach.call(document.querySelectorAll("#diffs .pill"), function (b) {
    b.setAttribute("aria-pressed", b.getAttribute("data-diff") === prefs.difficulty);
    b.onclick = function () {
      prefs.difficulty = b.getAttribute("data-diff"); save();
      Array.prototype.forEach.call(document.querySelectorAll("#diffs .pill"), function (x) { x.setAttribute("aria-pressed", x === b); });
      newProblem();
    };
  });

  document.getElementById("check").onclick = check;
  document.getElementById("revealBtn").onclick = reveal;
  document.getElementById("next").onclick = newProblem;
  document.getElementById("answer").addEventListener("keydown", function (e) { if (e.key === "Enter") check(); });

  function save() { try { localStorage.setItem(PREFS, JSON.stringify(prefs)); } catch (e) {} }
  newProblem();
})();

const root = document.documentElement;
const savedTheme = localStorage.getItem('max-theme');
if (savedTheme) root.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = root.getAttribute('data-theme');
  const isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  const next = isDark ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('max-theme', next);
});
</script>
</body>
</html>
