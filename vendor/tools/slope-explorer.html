<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slope Explorer</title>
<meta name="description" content="Drag two points on a coordinate grid and watch the rise, run, slope, and line equation update live. Fully client-side.">
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }

  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
  canvas { display: block; width: 100%; height: auto; border-radius: 10px; touch-action: none; cursor: grab; }
  canvas:active { cursor: grabbing; }
  .hint { text-align: center; color: var(--muted); font-size: .82rem; margin: 8px 0 0; }

  .readouts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ro { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .ro .rlab { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 3px; }
  .ro .rval { font-size: 1.1rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; word-break: break-word; }
  .ro.wide { grid-column: 1/-1; }
  @media (max-width: 480px) { .readouts { grid-template-columns: 1fr; } }

  .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 9px; padding: 9px 14px; font-size: .86rem; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.copied { color: var(--ok); border-color: var(--ok); }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }

  footer.app { margin-top: 22px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">← max</a>
      <h1>Slope Explorer</h1>
      <p>Drag either point (A or B) to see rise, run, slope, and the line's equation update live.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">🌗 Theme</button>
  </header>

  <div class="card">
    <canvas id="plot" width="640" height="480" aria-label="Slope graph — drag the two points to change the line" role="img"></canvas>
    <div class="hint">Drag either point to explore slope</div>
  </div>

  <div class="card">
    <div class="readouts" id="readouts">
      <div class="ro"><div class="rlab">Rise</div><div class="rval" id="r-rise">—</div></div>
      <div class="ro"><div class="rlab">Run</div><div class="rval" id="r-run">—</div></div>
      <div class="ro"><div class="rlab">Slope (m)</div><div class="rval" id="r-slope">—</div></div>
      <div class="ro"><div class="rlab">Y-intercept (b)</div><div class="rval" id="r-b">—</div></div>
      <div class="ro wide"><div class="rlab">Slope-intercept form</div><div class="rval" id="r-si">—</div></div>
      <div class="ro wide"><div class="rlab">Point-slope form</div><div class="rval" id="r-ps">—</div></div>
    </div>
    <div class="toolbar">
      <button class="btn" id="copyBtn" type="button">📋 Copy equation</button>
      <button class="btn" id="resetBtn" type="button">↺ Reset points</button>
    </div>
  </div>

  <footer class="app">Nothing you do here leaves your browser · a <strong>max</strong> tool</footer>
</div>

<script>
(function(){
  "use strict";
  var PKEY = "max-slope-explorer-pts";
  var DEFAULT_PTS = [{x:-3,y:1},{x:4,y:5}];
  var pts = DEFAULT_PTS.map(function(p){ return {x:p.x,y:p.y}; });
  try {
    var s = JSON.parse(localStorage.getItem(PKEY));
    if (s && s.length === 2 && isFinite(s[0].x) && isFinite(s[0].y) && isFinite(s[1].x) && isFinite(s[1].y)) pts = s;
  } catch(e){}

  var canvas = document.getElementById("plot"), ctx = canvas.getContext("2d");
  var VMIN = -10, VMAX = 10;
  var DRAG = null, HANDLE_R = 10;

  function save(){ try{ localStorage.setItem(PKEY, JSON.stringify(pts)); }catch(e){} }

  function fmt(n){
    if (!isFinite(n)) return "undefined";
    var r = Math.round(n*100)/100;
    return (Object.is(r,-0)?0:r).toString();
  }
  function signedB(n){
    var r = Math.round(n*100)/100;
    if (Object.is(r,-0)) r = 0;
    return r >= 0 ? " + "+r : " − "+Math.abs(r);
  }

  function cssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function resize(){
    var dpr = window.devicePixelRatio||1, W = canvas.clientWidth||640, H = Math.round(W*0.75);
    canvas.width = W*dpr; canvas.height = H*dpr; canvas.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0); draw();
  }
  function toScreen(mx,my,W,H){
    return { x:(mx-VMIN)/(VMAX-VMIN)*W, y:H-(my-VMIN)/(VMAX-VMIN)*H };
  }
  function toMath(sx,sy,W,H){
    return { x:Math.round(sx/W*(VMAX-VMIN)+VMIN), y:Math.round((1-sy/H)*(VMAX-VMIN)+VMIN) };
  }

  function draw(){
    var dpr = window.devicePixelRatio||1, W = canvas.width/dpr, H = canvas.height/dpr;
    var surface = cssVar('--surface') || '#fff';
    var border = cssVar('--border') || '#d9dee5';
    var muted = cssVar('--muted') || '#61707f';
    var text = cssVar('--text') || '#1c2530';
    var accent = cssVar('--accent') || '#2563eb';
    var accentInk = cssVar('--accent-ink') || '#fff';

    ctx.clearRect(0,0,W,H); ctx.fillStyle = surface; ctx.fillRect(0,0,W,H);

    // grid
    ctx.lineWidth = 1; ctx.font = "11px "+getComputedStyle(document.body).fontFamily; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    var o = toScreen(0,0,W,H);
    for (var g=VMIN; g<=VMAX; g++){
      var v = toScreen(g,g,W,H);
      ctx.strokeStyle = g===0 ? muted : border;
      ctx.beginPath(); ctx.moveTo(v.x,0); ctx.lineTo(v.x,H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,v.y); ctx.lineTo(W,v.y); ctx.stroke();
    }
    // axis labels
    ctx.fillStyle = muted;
    for (var t=VMIN; t<=VMAX; t+=2){
      if (t===0) continue;
      var px = toScreen(t,0,W,H), py = toScreen(0,t,W,H);
      ctx.textAlign = "center"; ctx.fillText(t,px.x,o.y+10);
      ctx.textAlign = "right"; ctx.fillText(t,o.x-5,py.y);
    }
    // bold axes
    ctx.strokeStyle = muted; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(o.x,0); ctx.lineTo(o.x,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,o.y); ctx.lineTo(W,o.y); ctx.stroke();

    var p1 = toScreen(pts[0].x,pts[0].y,W,H), p2 = toScreen(pts[1].x,pts[1].y,W,H);
    var dx = pts[1].x-pts[0].x, dy = pts[1].y-pts[0].y;

    // extended line through both points
    if (dx !== 0){
      var m = dy/dx, bv = pts[0].y - m*pts[0].x;
      var yL = m*VMIN+bv, yR = m*VMAX+bv;
      var sL = toScreen(VMIN,yL,W,H), sR = toScreen(VMAX,yR,W,H);
      ctx.strokeStyle = accent; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(sL.x,sL.y); ctx.lineTo(sR.x,sR.y); ctx.stroke();
    } else {
      ctx.strokeStyle = accent; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(p1.x,0); ctx.lineTo(p1.x,H); ctx.stroke();
    }

    // rise/run triangle
    if (dx !== 0 && dy !== 0){
      var corner = toScreen(pts[1].x,pts[0].y,W,H);
      ctx.strokeStyle = border; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(corner.x,corner.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(corner.x,corner.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
      ctx.setLineDash([]);
      // labels
      ctx.fillStyle = muted; ctx.font = "bold 12px "+getComputedStyle(document.body).fontFamily; ctx.textAlign = "center";
      ctx.fillText("run="+dx, (p1.x+corner.x)/2, corner.y+(dy>0?13:-13));
      ctx.textAlign = dx>0 ? "right" : "left";
      ctx.fillText("rise="+dy, corner.x+(dx>0?-5:5), (corner.y+p2.y)/2);
    }

    // point handles
    [p1,p2].forEach(function(p,i){
      ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(p.x,p.y,HANDLE_R,0,2*Math.PI); ctx.fill();
      ctx.fillStyle = accentInk; ctx.font = "bold 12px "+getComputedStyle(document.body).fontFamily; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(i===0?"A":"B", p.x,p.y);
      // coord label
      ctx.fillStyle = text; ctx.font = "11px "+getComputedStyle(document.body).fontFamily;
      ctx.textAlign = i===0 ? "right" : "left";
      ctx.fillText("("+pts[i].x+","+pts[i].y+")", p.x+(i===0?-14:14), p.y-14);
    });

    updateReadouts(dx,dy);
  }

  function currentEquation(dx,dy){
    if (dx === 0){
      return { slope:"undefined", b:"undefined", si:"x = "+pts[0].x+" (vertical line)", ps:"x = "+pts[0].x };
    }
    var m = dy/dx, bv = pts[0].y - m*pts[0].x;
    return {
      slope: fmt(m), b: fmt(bv),
      si: "y = "+fmt(m)+"x"+signedB(bv),
      ps: "y − "+pts[0].y+" = "+fmt(m)+"(x − "+pts[0].x+")"
    };
  }

  function updateReadouts(dx,dy){
    var eq = currentEquation(dx,dy);
    document.getElementById("r-rise").textContent = dy;
    document.getElementById("r-run").textContent = dx;
    document.getElementById("r-slope").textContent = eq.slope;
    document.getElementById("r-b").textContent = eq.b;
    document.getElementById("r-si").textContent = eq.si;
    document.getElementById("r-ps").textContent = eq.ps;
  }

  // drag handling
  function hitPoint(sx,sy,W,H){
    for (var i=0;i<2;i++){
      var p = toScreen(pts[i].x,pts[i].y,W,H);
      if (Math.hypot(sx-p.x,sy-p.y) < HANDLE_R*1.8) return i;
    }
    return -1;
  }
  function eventPos(e){
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { sx: src.clientX-r.left, sy: src.clientY-r.top };
  }
  function onDown(e){
    var dpr = window.devicePixelRatio||1;
    var W = canvas.width/dpr, H = canvas.height/dpr;
    var pos = eventPos(e); DRAG = hitPoint(pos.sx,pos.sy,W,H);
    if (DRAG >= 0) e.preventDefault();
  }
  function onMove(e){
    if (DRAG === null || DRAG < 0) return;
    e.preventDefault();
    var dpr = window.devicePixelRatio||1;
    var W = canvas.width/dpr, H = canvas.height/dpr;
    var pos = eventPos(e);
    var m = toMath(pos.sx,pos.sy,W,H);
    m.x = Math.max(VMIN, Math.min(VMAX, m.x));
    m.y = Math.max(VMIN, Math.min(VMAX, m.y));
    pts[DRAG] = m; save(); draw();
  }
  function onUp(){ DRAG = -1; }

  canvas.addEventListener("mousedown", onDown);
  canvas.addEventListener("mousemove", onMove);
  canvas.addEventListener("mouseup", onUp);
  canvas.addEventListener("touchstart", onDown, {passive:false});
  canvas.addEventListener("touchmove", onMove, {passive:false});
  canvas.addEventListener("touchend", onUp);
  window.addEventListener("resize", resize);

  // copy equation
  document.getElementById("copyBtn").addEventListener("click", function(){
    var dx = pts[1].x-pts[0].x, dy = pts[1].y-pts[0].y;
    var eq = currentEquation(dx,dy);
    var text = eq.si + "   (" + eq.ps + ")";
    var btn = this;
    try {
      navigator.clipboard.writeText(text).then(function(){
        var orig = btn.textContent;
        btn.textContent = "✓ Copied";
        btn.classList.add("copied");
        setTimeout(function(){ btn.textContent = orig; btn.classList.remove("copied"); }, 1200);
      });
    } catch(e){}
  });

  // reset points
  document.getElementById("resetBtn").addEventListener("click", function(){
    pts = DEFAULT_PTS.map(function(p){ return {x:p.x,y:p.y}; });
    save(); draw();
  });

  resize();

  // theme toggle
  const root = document.documentElement;
  const savedTheme = localStorage.getItem('max-theme');
  if (savedTheme) root.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = root.getAttribute('data-theme');
    const isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    const next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('max-theme', next);
    draw();
  });
})();
</script>
</body>
</html>
