<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Class Timer</title>
<meta name="description" content="A big, projector-friendly countdown timer and stopwatch for the classroom. Fully client-side.">
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 48px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }

  .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 9px; padding: 9px 14px; font-size: .86rem; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; font-family: var(--sans); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); color: var(--accent-ink); }
  footer.app { margin-top: 22px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }

  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; padding: 24px 0; text-align: center; }

  .modes { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; background: var(--surface); }
  .modes button { border: 0; background: var(--surface); color: var(--text); padding: 9px 20px; font-size: .9rem; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .modes button[aria-pressed="true"] { background: var(--accent); color: var(--accent-ink); }

  .display { font-variant-numeric: tabular-nums; font-weight: 800; line-height: 1; font-size: min(32vw, 20rem); color: var(--accent); }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .action-btn { cursor: pointer; font-weight: 700; font-size: 1rem; padding: 12px 26px; border-radius: 12px; border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink); font-family: var(--sans); }
  .action-btn.secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
  .action-btn:hover { filter: brightness(.97); }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .presets button { cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 7px 16px; font-weight: 600; font-size: .85rem; font-family: var(--sans); }
  .presets button:hover { border-color: var(--accent); color: var(--accent); }

  .setrow { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; color: var(--muted); font-size: .9rem; }
  .setrow input { width: 64px; padding: 7px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 8px; font-size: 1rem; text-align: center; font-family: var(--sans); }
  .iconbtn { cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 10px; padding: 9px 14px; font-size: .85rem; font-family: var(--sans); }
  .iconbtn:hover { border-color: var(--accent); color: var(--accent); }

  .hidden { display: none !important; }

  #flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 10; }
  #flash.on { animation: pulse 1s ease-in-out infinite; pointer-events: auto; }
  @keyframes pulse { 0%,100% { opacity: 0; } 50% { opacity: .9; } }
  #flash .msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--accent-ink); font-size: min(12vw, 5rem); font-weight: 800; }
  #flash .dismiss { position: absolute; bottom: 9%; left: 50%; transform: translateX(-50%); }

  @media (max-width: 720px) {
    .display { font-size: min(38vw, 12rem); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">&larr; max</a>
      <h1>Class Timer</h1>
      <p>A big countdown timer and stopwatch built for the projector &mdash; readable from the back row, with fullscreen and a sound cue at zero.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">&#127775; Theme</button>
  </header>

  <main>
    <div class="modes" role="group" aria-label="Mode">
      <button id="mCount" aria-pressed="true">Countdown</button>
      <button id="mWatch" aria-pressed="false">Stopwatch</button>
    </div>

    <div class="display" id="display">05:00</div>

    <div class="presets" id="presets">
      <button data-min="1">1 min</button>
      <button data-min="5">5 min</button>
      <button data-min="10">10 min</button>
      <button data-min="15">15 min</button>
      <button data-min="20">20 min</button>
    </div>
    <div class="setrow" id="setrow">
      Set:
      <input id="setMin" type="number" min="0" max="180" value="5" aria-label="minutes"> min
      <input id="setSec" type="number" min="0" max="59" value="0" aria-label="seconds"> sec
      <button class="iconbtn" id="setBtn">Set</button>
    </div>

    <div class="controls">
      <button class="action-btn" id="startBtn">Start</button>
      <button class="action-btn secondary" id="resetBtn">Reset</button>
      <button class="iconbtn" id="fsBtn">&#10530; Fullscreen</button>
      <button class="iconbtn" id="muteBtn">&#128266; Sound on</button>
    </div>
  </main>

  <footer class="app">Your timer settings are saved locally in this browser only &middot; a <strong>max</strong> tool</footer>
</div>

<div id="flash"><div class="msg">Time!</div><button class="action-btn dismiss" id="dismiss">Dismiss</button></div>

<script>
(function(){
  "use strict";
  var PREFS_KEY = "max-class-timer-prefs";
  var prefs = { lastSec: 300, muted: false };
  try { var s = JSON.parse(localStorage.getItem(PREFS_KEY)); if (s) prefs = Object.assign(prefs, s); } catch(e) {}

  var mode = "count", running = false, targetEnd = 0, remainingMs = prefs.lastSec * 1000, swStart = 0, swAccum = 0, tick = null;
  var display = document.getElementById("display"), startBtn = document.getElementById("startBtn"), flash = document.getElementById("flash");

  function pad(n) { return (n < 10 ? "0" : "") + n; }
  function fmt(ms) {
    if (ms < 0) ms = 0;
    var t = Math.round(ms / 1000), m = Math.floor(t / 60), s = t % 60;
    if (m > 99) { var h = Math.floor(m / 60); return h + ":" + pad(m % 60) + ":" + pad(s); }
    return pad(m) + ":" + pad(s);
  }

  function render() {
    if (mode === "count") { display.textContent = fmt(running ? (targetEnd - Date.now()) : remainingMs); }
    else { display.textContent = fmt(swAccum + (running ? (Date.now() - swStart) : 0)); }
  }
  function startLoop() { if (!tick) tick = setInterval(loop, 200); }
  function stopLoop() { if (tick) { clearInterval(tick); tick = null; } }
  function loop() {
    if (mode === "count" && running && Date.now() >= targetEnd) { running = false; remainingMs = 0; stopLoop(); render(); finish(); updateStart(); return; }
    render();
  }
  function updateStart() { startBtn.textContent = running ? "Pause" : "Start"; }

  function start() {
    if (mode === "count") { if (remainingMs <= 0) return; targetEnd = Date.now() + remainingMs; }
    else { swStart = Date.now(); }
    running = true; startLoop(); updateStart();
  }
  function pause() {
    if (mode === "count") { remainingMs = Math.max(0, targetEnd - Date.now()); }
    else { swAccum += Date.now() - swStart; }
    running = false; stopLoop(); render(); updateStart();
  }
  function reset() {
    running = false; stopLoop();
    if (mode === "count") remainingMs = prefs.lastSec * 1000; else swAccum = 0;
    stopFlash(); render(); updateStart();
  }
  startBtn.onclick = function() { running ? pause() : start(); };
  document.getElementById("resetBtn").onclick = reset;

  function setMode(m) {
    mode = m; running = false; stopLoop(); stopFlash();
    document.getElementById("mCount").setAttribute("aria-pressed", m === "count");
    document.getElementById("mWatch").setAttribute("aria-pressed", m === "watch");
    document.getElementById("presets").classList.toggle("hidden", m !== "count");
    document.getElementById("setrow").classList.toggle("hidden", m !== "count");
    if (m === "count") remainingMs = prefs.lastSec * 1000; else swAccum = 0;
    render(); updateStart();
  }
  document.getElementById("mCount").onclick = function() { setMode("count"); };
  document.getElementById("mWatch").onclick = function() { setMode("watch"); };

  function setCountdown(sec) { prefs.lastSec = sec; save(); running = false; stopLoop(); stopFlash(); remainingMs = sec * 1000; render(); updateStart(); }
  Array.prototype.forEach.call(document.querySelectorAll("#presets button"), function(b) {
    b.onclick = function() {
      var min = parseInt(b.getAttribute("data-min"), 10);
      document.getElementById("setMin").value = min;
      document.getElementById("setSec").value = 0;
      setCountdown(min * 60);
    };
  });
  document.getElementById("setBtn").onclick = function() {
    var m = parseInt(document.getElementById("setMin").value, 10) || 0, s = parseInt(document.getElementById("setSec").value, 10) || 0;
    setCountdown(Math.max(0, m * 60 + s));
  };

  document.getElementById("fsBtn").onclick = function() {
    if (document.fullscreenElement) { document.exitFullscreen(); }
    else if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }
  };

  var muteBtn = document.getElementById("muteBtn");
  function renderMute() { muteBtn.textContent = prefs.muted ? "🔇 Sound off" : "🔊 Sound on"; }
  muteBtn.onclick = function() { prefs.muted = !prefs.muted; save(); renderMute(); };
  renderMute();

  function chime() {
    if (prefs.muted) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
      var ctx = new AC();
      [0, 0.18, 0.36].forEach(function(off) {
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = "sine"; o.frequency.value = 880; o.connect(g); g.connect(ctx.destination);
        var t = ctx.currentTime + off;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.4, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
        o.start(t); o.stop(t + 0.2);
      });
    } catch(e) {}
  }
  function finish() { flash.classList.add("on"); chime(); }
  function stopFlash() { flash.classList.remove("on"); }
  document.getElementById("dismiss").onclick = stopFlash;

  function save() { try { localStorage.setItem(PREFS_KEY, JSON.stringify(prefs)); } catch(e) {} }

  document.getElementById("setMin").value = Math.floor(prefs.lastSec / 60);
  document.getElementById("setSec").value = prefs.lastSec % 60;
  render();

  // ---------- theme ----------
  var root = document.documentElement;
  var savedTheme = localStorage.getItem('max-theme');
  if (savedTheme) root.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').addEventListener('click', function() {
    var cur = root.getAttribute('data-theme');
    var isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    var next = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('max-theme', next);
  });
})();
</script>
</body>
</html>
