<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry Toolbox</title>
<meta name="description" content="Pick a 2D or 3D shape, type its measurements, and instantly see area, perimeter, volume, and surface area with the formula used. Fully client-side.">
<style>
  :root {
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5; --border:#d9dee5;
    --text:#1c2530; --muted:#61707f; --accent:#2563eb; --accent-ink:#ffffff;
    --danger:#c0392b; --ok:#1a7f4b; --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 4px 16px rgba(16,24,40,.06);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --math: Georgia, "Times New Roman", "STIX Two Text", serif;
  }
  :root[data-theme="dark"] {
    --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
    --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
    --danger:#ff6b5e; --ok:#43c98b;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#0e1116; --surface:#171b22; --surface-2:#1f242d; --border:#2b323d;
      --text:#e7ecf2; --muted:#96a2b1; --accent:#4f86ff; --accent-ink:#0e1116;
      --danger:#ff6b5e; --ok:#43c98b;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.35);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.45; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 24px 20px 48px; }
  header.app { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: -0.01em; }
  header.app p { margin: 0; color: var(--muted); font-size: .92rem; max-width: 64ch; }
  .theme-toggle { flex: none; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 999px; padding: 8px 14px; cursor: pointer; font-size: .85rem; }
  .theme-toggle:hover { background: var(--surface-2); }
  .backlink { display: inline-block; color: var(--muted); text-decoration: none; font-size: .82rem; margin: 0 0 10px; }
  .backlink:hover { color: var(--accent); }
  .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 9px; padding: 9px 14px; font-size: .86rem; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.05); color: var(--accent-ink); }
  .btn.copied { color: var(--ok); border-color: var(--ok); }
  footer.app { margin-top: 26px; color: var(--muted); font-size: .8rem; text-align: center; }
  a { color: var(--accent); }

  .m { font-family: var(--math); }
  .m var, var { font-style: italic; font-family: inherit; }
  .m sup { font-size: .7em; }

  .section-label { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 8px; font-weight: 700; }
  .shape-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .shape-btn { cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px 14px; font-size: .85rem; font-weight: 600; color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 76px; }
  .shape-btn svg { display: block; color: var(--muted); }
  .shape-btn[aria-pressed="true"] { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface)); color: var(--accent); }
  .shape-btn[aria-pressed="true"] svg { color: var(--accent); }
  .shape-btn:hover { border-color: var(--accent); }
  .shape-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 16px; }
  .shape-diagram { text-align: center; margin-bottom: 18px; color: var(--accent); }
  .shape-diagram svg { max-width: 200px; width: 100%; height: auto; }
  .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .card-head h2 { font-size: 1.05rem; margin: 0; }

  .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: .8rem; font-weight: 700; color: var(--muted); }
  .field input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; background: var(--bg); color: var(--text); }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }

  .results { margin-top: 18px; display: grid; gap: 10px; }
  .result-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
  .result-row .rlabel { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; }
  .result-row .formula { font-size: 1.05rem; margin: 2px 0; }
  .result-row .value { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
  .empty-state { text-align: center; color: var(--muted); padding: 30px; }
  .note.err { color: var(--danger); font-size: .85rem; margin-top: 10px; }

  @media (max-width: 720px) {
    .inputs-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div>
      <a class="backlink" href="./index.html">← All tools</a>
      <h1>Geometry Toolbox</h1>
      <p>Pick a shape, type its measurements, and get area, perimeter, volume, or surface area instantly — along with the formula used.</p>
    </div>
    <button class="theme-toggle" id="themeBtn" type="button" aria-label="Toggle color theme">🌗 Theme</button>
  </header>

  <div class="section-label">2D shapes</div>
  <div class="shape-grid" id="shapes2d"></div>
  <div class="section-label">3D shapes</div>
  <div class="shape-grid" id="shapes3d"></div>

  <div class="card" id="toolcard">
    <div class="empty-state">Choose a shape above to get started.</div>
  </div>

  <footer class="app">Nothing you type leaves this page · a <strong>max</strong> tool</footer>
</div>

<script>
(function () {
  "use strict";
  var PKEY = "max-geometry-toolbox";
  var prefs = { shape: "rectangle", vals: {} };
  try { var s = JSON.parse(localStorage.getItem(PKEY)); if (s) prefs = Object.assign(prefs, s); } catch (e) {}
  function save() { try { localStorage.setItem(PKEY, JSON.stringify(prefs)); } catch (e) {} }

  function fmt(n) { if (!isFinite(n)) return "—"; var r = Math.round(n * 1000) / 1000; return r.toString(); }

  // Sample values shown via the "Use example numbers" button, and used to
  // pre-fill the very first shape a visitor sees so the tool never looks empty.
  var SAMPLES = {
    rectangle: { l: 8, w: 5 },
    triangle: { b: 6, h: 4 },
    circle: { r: 5 },
    parallelogram: { b: 7, h: 3 },
    trapezoid: { b1: 4, b2: 8, h: 5 },
    rect_prism: { l: 4, w: 3, h: 6 },
    cylinder: { r: 3, h: 5 },
    cone: { r: 3, h: 5 },
    sphere: { r: 4 },
    pyramid: { b: 5, h: 6 }
  };

  // shape definitions: fields to collect, and a results() function returning
  // [{label, formula (HTML), value}] rows. SVGs use currentColor so they pick
  // up the theme accent automatically; muted lines use var(--muted).
  var SHAPES = {
    // ---- 2D ----
    rectangle: { label: "Rectangle", dim: "2d",
      fields: [{ k: "l", label: "Length (l)" }, { k: "w", label: "Width (w)" }],
      results: function (v) { var l = v.l, w = v.w; return [
        { label: "Area", formula: "A = l × w", value: fmt(l * w) + " units²" },
        { label: "Perimeter", formula: "P = 2l + 2w", value: fmt(2 * l + 2 * w) + " units" }]; },
      svg: '<rect x="20" y="40" width="160" height="80" fill="none" stroke="currentColor" stroke-width="2.5"/><text x="100" y="165" text-anchor="middle" fill="var(--muted)" font-size="13">l</text><text x="8" y="85" text-anchor="middle" fill="var(--muted)" font-size="13">w</text>' },
    triangle: { label: "Triangle", dim: "2d",
      fields: [{ k: "b", label: "Base (b)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { return [{ label: "Area", formula: "A = ½ × b × h", value: fmt(.5 * v.b * v.h) + " units²" }]; },
      svg: '<polygon points="100,20 20,150 180,150" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="100" y1="20" x2="100" y2="150" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="5,3"/><text x="100" y="168" text-anchor="middle" fill="var(--muted)" font-size="13">b</text><text x="112" y="100" fill="var(--muted)" font-size="13">h</text>' },
    circle: { label: "Circle", dim: "2d",
      fields: [{ k: "r", label: "Radius (r)" }],
      results: function (v) { var r = v.r; return [
        { label: "Area", formula: "A = π × r²", value: fmt(Math.PI * r * r) + " units²" },
        { label: "Circumference", formula: "C = 2 × π × r", value: fmt(2 * Math.PI * r) + " units" }]; },
      svg: '<circle cx="100" cy="90" r="70" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="100" y1="90" x2="170" y2="90" stroke="var(--border)" stroke-width="1.5"/><text x="137" y="82" fill="var(--muted)" font-size="13">r</text>' },
    parallelogram: { label: "Parallelogram", dim: "2d",
      fields: [{ k: "b", label: "Base (b)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { return [{ label: "Area", formula: "A = b × h", value: fmt(v.b * v.h) + " units²" }]; },
      svg: '<polygon points="40,140 80,30 180,30 140,140" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="80" y1="30" x2="80" y2="140" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="5,3"/><text x="110" y="160" text-anchor="middle" fill="var(--muted)" font-size="13">b</text><text x="67" y="90" fill="var(--muted)" font-size="13">h</text>' },
    trapezoid: { label: "Trapezoid", dim: "2d",
      fields: [{ k: "b1", label: "Base 1 (b₁)" }, { k: "b2", label: "Base 2 (b₂)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { return [{ label: "Area", formula: "A = ½ × (b₁ + b₂) × h", value: fmt(.5 * (v.b1 + v.b2) * v.h) + " units²" }]; },
      svg: '<polygon points="50,140 90,30 150,30 180,140" fill="none" stroke="currentColor" stroke-width="2.5"/><text x="115" y="26" text-anchor="middle" fill="var(--muted)" font-size="13">b₁</text><text x="115" y="155" text-anchor="middle" fill="var(--muted)" font-size="13">b₂</text>' },
    // ---- 3D ----
    rect_prism: { label: "Rect. Prism", dim: "3d",
      fields: [{ k: "l", label: "Length (l)" }, { k: "w", label: "Width (w)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { var l = v.l, w = v.w, h = v.h; return [
        { label: "Volume", formula: "V = l × w × h", value: fmt(l * w * h) + " units³" },
        { label: "Surface area", formula: "SA = 2 × (lw + lh + wh)", value: fmt(2 * (l * w + l * h + w * h)) + " units²" }]; },
      svg: '<rect x="30" y="50" width="120" height="90" fill="none" stroke="currentColor" stroke-width="2.5"/><rect x="60" y="20" width="120" height="90" fill="none" stroke="var(--border)" stroke-width="1.5"/><line x1="30" y1="50" x2="60" y2="20" stroke="var(--border)" stroke-width="1.5"/><line x1="150" y1="50" x2="180" y2="20" stroke="var(--border)" stroke-width="1.5"/><line x1="30" y1="140" x2="60" y2="110" stroke="var(--border)" stroke-width="1.5"/><line x1="150" y1="140" x2="180" y2="110" stroke="var(--border)" stroke-width="1.5"/>' },
    cylinder: { label: "Cylinder", dim: "3d",
      fields: [{ k: "r", label: "Radius (r)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { var r = v.r, h = v.h; return [
        { label: "Volume", formula: "V = π × r² × h", value: fmt(Math.PI * r * r * h) + " units³" },
        { label: "Surface area", formula: "SA = 2πr² + 2πrh", value: fmt(2 * Math.PI * r * r + 2 * Math.PI * r * h) + " units²" }]; },
      svg: '<ellipse cx="100" cy="40" rx="70" ry="20" fill="none" stroke="currentColor" stroke-width="2.5"/><ellipse cx="100" cy="140" rx="70" ry="20" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="30" y1="40" x2="30" y2="140" stroke="currentColor" stroke-width="2.5"/><line x1="170" y1="40" x2="170" y2="140" stroke="currentColor" stroke-width="2.5"/>' },
    cone: { label: "Cone", dim: "3d",
      fields: [{ k: "r", label: "Radius (r)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { var r = v.r, h = v.h, sl = Math.sqrt(r * r + h * h); return [
        { label: "Volume", formula: "V = ⅓ × π × r² × h", value: fmt(Math.PI * r * r * h / 3) + " units³" },
        { label: "Surface area", formula: "SA = πr² + πrl", value: fmt(Math.PI * r * r + Math.PI * r * sl) + " units² (l = slant height = " + fmt(sl) + ")" }]; },
      svg: '<ellipse cx="100" cy="150" rx="70" ry="18" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="30" y1="150" x2="100" y2="20" stroke="currentColor" stroke-width="2.5"/><line x1="170" y1="150" x2="100" y2="20" stroke="currentColor" stroke-width="2.5"/>' },
    sphere: { label: "Sphere", dim: "3d",
      fields: [{ k: "r", label: "Radius (r)" }],
      results: function (v) { var r = v.r; return [
        { label: "Volume", formula: "V = 4⁄3 × π × r³", value: fmt(4 / 3 * Math.PI * r * r * r) + " units³" },
        { label: "Surface area", formula: "SA = 4 × π × r²", value: fmt(4 * Math.PI * r * r) + " units²" }]; },
      svg: '<circle cx="100" cy="90" r="70" fill="none" stroke="currentColor" stroke-width="2.5"/><ellipse cx="100" cy="90" rx="70" ry="22" fill="none" stroke="var(--border)" stroke-width="1.5"/>' },
    pyramid: { label: "Pyramid", dim: "3d",
      fields: [{ k: "b", label: "Base side (b)" }, { k: "h", label: "Height (h)" }],
      results: function (v) { var b = v.b, h = v.h, sl = Math.sqrt((b / 2) * (b / 2) + h * h); return [
        { label: "Volume", formula: "V = ⅓ × b² × h", value: fmt(b * b * h / 3) + " units³" },
        { label: "Surface area", formula: "SA = b² + 2bl", value: fmt(b * b + 2 * b * sl) + " units² (l = slant height = " + fmt(sl) + ")" }]; },
      svg: '<polygon points="100,15 20,155 180,155" fill="none" stroke="currentColor" stroke-width="2.5"/><line x1="100" y1="15" x2="140" y2="130" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="5,3"/><polygon points="20,155 60,130 180,155 140,130" fill="none" stroke="var(--border)" stroke-width="1.5"/>' }
  };

  var ORDER2D = ["rectangle", "triangle", "circle", "parallelogram", "trapezoid"];
  var ORDER3D = ["rect_prism", "cylinder", "cone", "sphere", "pyramid"];

  function buildShapeButtons(ids, hostId) {
    var host = document.getElementById(hostId); host.innerHTML = "";
    ids.forEach(function (id) {
      var sh = SHAPES[id];
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "shape-btn";
      btn.setAttribute("aria-pressed", id === prefs.shape ? "true" : "false");
      btn.setAttribute("aria-label", sh.label);
      btn.innerHTML = '<svg viewBox="0 0 200 170" width="48" height="40" aria-hidden="true">' + sh.svg + '</svg><span>' + sh.label + '</span>';
      btn.addEventListener("click", function () {
        prefs.shape = id; if (!prefs.vals[id]) prefs.vals[id] = {}; save();
        document.querySelectorAll(".shape-btn").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
        btn.setAttribute("aria-pressed", "true");
        renderTool();
      });
      host.appendChild(btn);
    });
  }

  function renderTool() {
    var sh = SHAPES[prefs.shape];
    if (!sh) { document.getElementById("toolcard").innerHTML = '<div class="empty-state">Choose a shape above.</div>'; return; }
    if (!prefs.vals[prefs.shape]) prefs.vals[prefs.shape] = {};
    var vals = prefs.vals[prefs.shape];

    var inputsHtml = sh.fields.map(function (f) {
      return '<div class="field"><label for="inp-' + f.k + '">' + f.label + '</label>' +
        '<input type="number" min="0" step="any" inputmode="decimal" id="inp-' + f.k + '" value="' + (vals[f.k] || '') + '"></div>';
    }).join('');

    document.getElementById("toolcard").innerHTML =
      '<div class="shape-diagram"><svg viewBox="0 0 200 170" width="200" height="170" role="img" aria-label="' + sh.label + ' diagram">' + sh.svg + '</svg></div>' +
      '<div class="card-head"><h2>' + sh.label + '</h2><button class="btn" id="exampleBtn" type="button">Use example numbers</button></div>' +
      '<div class="inputs-grid">' + inputsHtml + '</div>' +
      '<div class="results" id="results"><div class="empty-state" style="padding:20px">Enter the measurements above.</div></div>';

    sh.fields.forEach(function (f) {
      var inp = document.getElementById("inp-" + f.k);
      inp.addEventListener("input", function () {
        vals[f.k] = parseFloat(inp.value) || 0; save(); computeResults();
      });
    });
    document.getElementById("exampleBtn").addEventListener("click", function () {
      var sample = SAMPLES[prefs.shape] || {};
      sh.fields.forEach(function (f) {
        vals[f.k] = sample[f.k] != null ? sample[f.k] : vals[f.k];
        var inp = document.getElementById("inp-" + f.k);
        if (inp) inp.value = vals[f.k];
      });
      save(); computeResults();
    });
    computeResults();
  }

  function computeResults() {
    var sh = SHAPES[prefs.shape]; if (!sh) return;
    var vals = prefs.vals[prefs.shape] || {};
    var allFilled = sh.fields.every(function (f) { return isFinite(vals[f.k]) && vals[f.k] > 0; });
    var host = document.getElementById("results"); if (!host) return;
    if (!allFilled) { host.innerHTML = '<div class="empty-state" style="padding:20px">Enter all measurements to compute.</div>'; return; }
    var rows = sh.results(vals);
    host.innerHTML = rows.map(function (r) {
      return '<div class="result-row">' +
        '<div class="rlabel">' + r.label + '</div>' +
        '<div class="formula m">' + r.formula + '</div>' +
        '<div class="value">' + r.value + '</div>' +
        '</div>';
    }).join('');
  }

  // First-ever visit: give the default shape sample numbers so the tool
  // shows a real result immediately instead of an empty form.
  if (!localStorage.getItem(PKEY)) {
    prefs.vals.rectangle = Object.assign({}, SAMPLES.rectangle);
  }

  buildShapeButtons(ORDER2D, "shapes2d");
  buildShapeButtons(ORDER3D, "shapes3d");
  renderTool();
})();

/* ---------- theme ---------- */
const root = document.documentElement;
const savedTheme = localStorage.getItem('max-theme');
if (savedTheme) root.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = root.getAttribute('data-theme');
  const isDark = cur ? cur === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  const next = isDark ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('max-theme', next);
});
</script>
</body>
</html>
