<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bottle Game</title>

  <!-- PWA: installable, offline-capable app -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1b2a">

  <!-- iOS home-screen fallbacks (iOS ignores most manifest install behavior) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bottle Game">

  <link rel="stylesheet" href="css/style.css?v=23">
</head>
<body>

  <!-- ── Setup ───────────────────────────────────────── -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-card">
      <h1>Bottle Game</h1>

      <div>
        <div class="section-label">Players — pick a name &amp; flavor (tap Human/CPU to switch)</div>
        <div id="player-inputs"><!-- rendered by main.js --></div>
        <button id="add-player-btn">+ Add Player</button>
      </div>

      <div>
        <div class="section-label">Pass direction</div>
        <div class="direction-options">
          <label><input type="radio" name="direction" value="1" checked> ➡ Left → Right</label>
          <label><input type="radio" name="direction" value="-1"> ⬅ Right → Left</label>
        </div>
      </div>

      <div>
        <div class="section-label">CPU difficulty</div>
        <div class="direction-options">
          <label><input type="radio" name="difficulty" value="easy"> 🟢 Easy</label>
          <label><input type="radio" name="difficulty" value="medium" checked> 🟡 Medium</label>
          <label><input type="radio" name="difficulty" value="hard"> 🔴 Hard</label>
        </div>
      </div>

      <div>
        <div class="section-label">Starting lives</div>
        <div class="preset-options lives-options">
          <label><input type="radio" name="starting-lives" value="3"> 3</label>
          <label><input type="radio" name="starting-lives" value="5"> 5</label>
          <label><input type="radio" name="starting-lives" value="10" checked> 10</label>
          <label><input type="radio" name="starting-lives" value="20"> 20</label>
          <label><input type="radio" name="starting-lives" value="100"> 100</label>
        </div>
      </div>

      <button id="start-btn">Start Game</button>
      <button id="practice-btn">🎯 Practice (solo)</button>
      <div id="records-panel"></div>
    </div>
  </div>

  <!-- ── Game ────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="top-bar">
        <button id="menu-btn" aria-label="Main menu">☰</button>
        <span id="turn-banner"></span>
        <button id="mute-btn" aria-label="Mute">🔊</button>
        <span id="point-count"></span>
      </div>
      <div id="turn-timer"><div id="turn-timer-fill"></div></div>
      <div id="streak-banner"></div>
    </div>
    <div id="flip-hint">Flick up to flip!</div>
    <div id="player-list"></div>
  </div>

  <!-- ── Pass-and-play handoff ────────────────────────── -->
  <div id="pass-screen" class="screen hidden">
    <div id="pass-card" class="pass-card">
      <div class="pass-label">PASS TO</div>
      <div id="pass-name"></div>
      <button id="pass-go-btn">Tap to flip ▶</button>
    </div>
  </div>

  <!-- ── Game Over ────────────────────────────────────── -->
  <div id="game-over" class="screen hidden">
    <div class="game-over-card">
      <div style="font-size:3rem">🏆</div>
      <h2>Winner</h2>
      <div id="winner-name"></div>
      <div id="scoreboard"></div>
      <div id="game-stats"></div>
      <button id="play-again-btn">Play Again</button>
      <button id="home-btn">Main Menu</button>
    </div>
  </div>

  <!-- ?v= forces the browser to refetch on each release (dev server sends no
       cache headers). Bump alongside the service-worker CACHE_NAME. -->
  <script src="js/vendor/matter.min.js"></script>
  <script src="js/polyfills.js?v=23"></script>
  <script src="js/game.js?v=23"></script>
  <script src="js/physics.js?v=23"></script>
  <script src="js/input.js?v=23"></script>
  <script src="js/renderer.js?v=23"></script>
  <script src="js/audio.js?v=23"></script>
  <script src="js/settings.js?v=23"></script>
  <script src="js/records.js?v=23"></script>
  <script src="js/skins.js?v=23"></script>
  <script src="js/main.js?v=23"></script>
  <script>
    window.onerror = (msg, src, line) => {
      const el = document.getElementById('err-overlay') || (() => {
        const d = document.createElement('div');
        d.id = 'err-overlay';
        d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);color:#ff5252;font:14px monospace;padding:20px;z-index:9999;white-space:pre-wrap;overflow:auto;';
        document.body.appendChild(d); return d;
      })();
      el.textContent += `[${src?.split('/').pop()}:${line}] ${msg}\n`;
    };

    // Register the service worker for offline play — only on the deployed
    // (non-localhost) HTTP(S) site. Skipped on localhost (dev) and file://
    // (the bundled WebView APK, which is already fully offline).
    if ('serviceWorker' in navigator && location.protocol.startsWith('http') &&
        location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registered, scope:', reg.scope))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
